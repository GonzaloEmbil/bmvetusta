<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartel III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #1a1a1a;
        font-family: 'Inter', sans-serif;
    }

    .wrapper {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        padding: 24px;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a1a;
        border: 0;
        padding: 14px 32px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(253, 237, 58, 0.25);
        transition: transform 0.2s, box-shadow 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(253, 237, 58, 0.4);
    }

    .download-btn:disabled {
        opacity: 0.6;
        cursor: wait;
        transform: none;
    }

    .poster {
        width: 1080px;
        height: 1350px;
        background: radial-gradient(circle at 20% 0%, #1a1a2e 0%, #000 60%);
        color: #fff;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .poster::before {
        content: '';
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.18) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .poster::after {
        content: '';
        position: absolute;
        bottom: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.10) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    /* ── Header ──────────────────────────────────── */
    .header {
        text-align: center;
        padding: 65px 60px 35px;
        position: relative;
        z-index: 2;
    }

    .header-eyebrow {
        font-size: 18px;
        font-weight: 800;
        color: #FDED3A;
        letter-spacing: 8px;
        text-transform: uppercase;
        margin-bottom: 18px;
    }

    .header-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 130px;
        line-height: 0.95;
        letter-spacing: 4px;
        margin-bottom: 30px;
    }

    .header-title-roman {
        color: #FDED3A;
        display: block;
        font-size: 110px;
        line-height: 1;
    }

    .header-logo {
        width: 130px;
        height: 130px;
        margin: 0 auto 22px;
        display: block;
    }

    .header-meta {
        display: inline-flex;
        gap: 18px;
        align-items: center;
        padding: 14px 30px;
        border: 2px solid rgba(253,237,58,0.4);
        border-radius: 999px;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
        margin-top: 8px;
    }

    .header-meta span:not(.sep) {
        color: #FDED3A;
    }

    .header-meta .sep {
        color: rgba(255,255,255,0.3);
        font-weight: 400;
    }

    /* ── Section title ───────────────────────────── */
    .section-title {
        text-align: center;
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.55);
        letter-spacing: 6px;
        text-transform: uppercase;
        margin: 30px 0 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
    }

    .section-title::before,
    .section-title::after {
        content: '';
        height: 1px;
        flex: 0 0 80px;
        background: linear-gradient(90deg, transparent, rgba(253,237,58,0.5));
    }

    .section-title::after {
        background: linear-gradient(90deg, rgba(253,237,58,0.5), transparent);
    }

    /* ── Teams grid ──────────────────────────────── */
    .teams {
        flex: 1;
        padding: 0 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 35px 30px;
        align-content: center;
        position: relative;
        z-index: 2;
    }

    .team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }

    .team-shield {
        width: 130px;
        height: 130px;
        object-fit: contain;
        background: rgba(255,255,255,0.06);
        border-radius: 18px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .team-name {
        font-size: 14px;
        font-weight: 700;
        text-align: center;
        line-height: 1.25;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #fff;
        max-width: 160px;
    }

    /* ── Footer ──────────────────────────────────── */
    .footer {
        padding: 30px 60px 50px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    .footer-categories {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 22px;
    }

    .category-pill {
        background: rgba(253,237,58,0.12);
        color: #FDED3A;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 8px 18px;
        border-radius: 999px;
        text-transform: uppercase;
    }

    .footer-venue {
        font-size: 16px;
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .footer-venue strong {
        color: #fff;
    }
</style>
</head>
<body>
<div class="wrapper">
<button id="download-btn" class="download-btn" type="button">
    ⬇ Descargar cartel
</button>
<div class="poster" id="poster">
    <div class="header">
        <img src="../src/assets/logo.png" alt="" class="header-logo">
        <h1 class="header-title">
            <span class="header-title-roman">III TORNEO</span>
            BM VETUSTA
        </h1>
        <div class="header-meta">
            <span>19</span><span class="sep">·</span><span>20</span><span class="sep">·</span><span>21</span><span class="sep" style="margin-left:8px;">JUNIO</span><span>2026</span>
        </div>
    </div>

    <div class="section-title">Equipos participantes</div>

    <div class="teams">
        <div class="team">
            <img src="../src/assets/logo.png" class="team-shield" alt="">
            <div class="team-name">BM Vetusta</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_cd_balopal.png" class="team-shield" alt="">
            <div class="team-name">CD Balopal</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_bm_chinchon.jpeg" class="team-shield" alt="">
            <div class="team-name">BM Chinchón</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_bm_cidade_das_burgas.jpg" class="team-shield" alt="">
            <div class="team-name">BM Cidade<br>das Burgas</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_bm_xallas.jpeg" class="team-shield" alt="">
            <div class="team-name">BM Xallas</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_egia_eskubaloia.jpeg" class="team-shield" alt="">
            <div class="team-name">Egia<br>Eskubaloia</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_seleccion_asturiana.jpg" class="team-shield" alt="">
            <div class="team-name">Selección<br>Asturiana</div>
        </div>
        <div class="team">
            <img src="../src/assets/escudo_deportivoestadio.jpeg" class="team-shield" alt="">
            <div class="team-name">Deportivo<br>Estadio</div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-categories">
            <span class="category-pill">Cadete Femenino</span>
            <span class="category-pill">Cadete Masculino</span>
            <span class="category-pill">Infantil Masculino</span>
        </div>
        <div class="footer-venue">Florida Arena <strong>·</strong> Pabellón Vallobín <strong>·</strong> Oviedo</div>
    </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
(function() {
    var btn = document.getElementById('download-btn');
    var poster = document.getElementById('poster');
    btn.addEventListener('click', function() {
        btn.disabled = true;
        btn.textContent = 'Generando…';
        html2canvas(poster, {
            backgroundColor: null,
            scale: 1,
            useCORS: true,
            width: 1080,
            height: 1350,
            windowWidth: 1080,
            windowHeight: 1350
        }).then(function(canvas) {
            canvas.toBlob(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = 'cartel-iii-torneo-bm-vetusta.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                btn.disabled = false;
                btn.textContent = '⬇ Descargar cartel';
            }, 'image/png');
        }).catch(function(err) {
            console.error(err);
            alert('No se pudo generar el cartel. Revisa la consola.');
            btn.disabled = false;
            btn.textContent = '⬇ Descargar cartel';
        });
    });
})();
</script>
</body>
</html>
