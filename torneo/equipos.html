<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carteles equipos · III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;800;900&family=Kalam:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #0c0c14;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* Side nav buttons (prev/next) */
    .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(31,31,46,0.9);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 26px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.2s;
        z-index: 20;
        backdrop-filter: blur(8px);
    }
    .nav-arrow:hover {
        background: #FDED3A;
        color: #0a0a1a;
    }
    .nav-arrow.prev { left: -28px; }
    .nav-arrow.next { right: -28px; }
    @media (max-width: 720px) {
        .nav-arrow { width: 44px; height: 44px; font-size: 20px; }
        .nav-arrow.prev { left: -10px; }
        .nav-arrow.next { right: -10px; }
    }

    .stage-outer {
        position: relative;
        display: inline-block;
    }

    /* Download buttons fixed bottom-right */
    .download-cluster {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 30;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a1a;
        border: 0;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 22px rgba(253,237,58,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        white-space: nowrap;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(253,237,58,0.5);
    }
    .download-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }

    .download-all-btn {
        background: rgba(31,31,46,0.92);
        color: #FDED3A;
        border: 1px solid #FDED3A;
        padding: 12px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }
    .download-all-btn:hover { background: #FDED3A; color: #0a0a1a; }
    .download-all-btn:disabled { opacity: 0.6; cursor: wait; }

    .slide-info {
        color: rgba(255,255,255,0.7);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* ── Stage ─────────────────────────────────────────── */
    :root {
        --scale: 1;
    }

    .stage-wrap {
        width: calc(1080px * var(--scale));
        height: calc(1350px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        border-radius: 8px;
        overflow: hidden;
    }

    .stage {
        width: 1080px;
        height: 1350px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .slides { position: relative; width: 100%; height: 100%; }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
    }
    .slide.active { opacity: 1; visibility: visible; }

    /* ── Poster ────────────────────────────────────────── */
    .poster {
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #fff;
        position: relative;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* Cruz de la Victoria — kept in Oviedo Cathedral's Cámara Santa.
       Sits behind the team shield as the central iconographic anchor
       of the poster. Yellow at 12% so it reads as a presence, not a
       full-color object. */
    .poster-cruz {
        position: absolute;
        left: 50%;
        top: 290px;
        transform: translateX(-50%);
        width: 580px;
        height: 860px;
        color: rgba(253,237,58,0.13);
        z-index: 1;
        pointer-events: none;
    }
    .poster-cruz svg { width: 100%; height: 100%; display: block; }

    /* Cathedral tower — Torre de San Salvador. Vertical anchor on the
       left edge. */
    .poster-cathedral {
        position: absolute;
        left: 40px;
        top: 280px;
        width: 132px;
        height: 500px;
        color: rgba(253,237,58,0.55);
        z-index: 2;
        pointer-events: none;
    }
    .poster-cathedral svg { width: 100%; height: 100%; display: block; }

    /* Santa María del Naranco — pre-Romanesque palace. Sits on the right
       edge as a small architectural reference. */
    .poster-naranco {
        position: absolute;
        right: 40px;
        bottom: 220px;
        width: 220px;
        height: 134px;
        color: rgba(253,237,58,0.55);
        z-index: 2;
        pointer-events: none;
    }
    .poster-naranco svg { width: 100%; height: 100%; display: block; }

    /* ── Top bar ───────────────────────────────────────── */
    .top-bar {
        position: absolute;
        top: 90px;
        left: 90px;
        right: 230px;          /* leave room for the III mark on the right */
        display: flex;
        align-items: center;
        gap: 22px;
        z-index: 5;
    }

    .top-logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        flex-shrink: 0;
    }

    .top-brand-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1;
    }

    .top-brand-eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 5px;
        color: rgba(255,255,255,0.55);
        text-transform: uppercase;
    }

    .top-brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 48px;
        line-height: 1;
        letter-spacing: 2px;
        color: #fff;
    }

    /* The 'Vetusta' word inside the brand title is set in Playfair Display
       italic — paying homage to Clarín's literary name for Oviedo. */
    .vetusta-serif {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 700;
        letter-spacing: -1px;
        color: #FDED3A;
        text-transform: none;
        font-size: 0.82em;
        margin-left: 6px;
    }

    /* ── Center: shield ────────────────────────────────── */
    .center {
        position: absolute;
        top: 320px;
        left: 0;
        right: 0;
        z-index: 3;
        text-align: center;
        padding: 0 90px;
    }

    .shield-stage {
        width: 480px;
        height: 480px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .shield-disc {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .shield-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    /* Team name + city block — sits between the shield and the court */
    .name-block {
        position: absolute;
        left: 90px;
        right: 90px;
        bottom: 360px;
        text-align: center;
        z-index: 5;
    }

    .team-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 124px;
        line-height: 0.88;
        letter-spacing: 1px;
        color: #fff;
        text-transform: uppercase;
        margin-bottom: 16px;
    }
    .team-name.size-2 { font-size: 108px; }
    .team-name.size-3 { font-size: 90px; }
    .team-name.size-4 { font-size: 74px; }

    .team-city {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 26px;
        font-weight: 400;
        color: rgba(255,255,255,0.85);
    }

    .team-city svg {
        width: 18px;
        height: 18px;
        fill: #FDED3A;
        flex-shrink: 0;
    }

    /* ── Footer (sits inside the court arcs zone) ──────── */
    .bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 90px 70px;
        z-index: 5;
    }

    .categories {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 4px;
        color: rgba(255,255,255,0.7);
        text-transform: uppercase;
        margin-bottom: 26px;
        line-height: 1;
        text-align: center;
    }

    .category-sep {
        color: #FDED3A;
        margin: 0 12px;
    }

    .bottom-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 32px;
        line-height: 1;
    }

    .bottom-meta-dates {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        letter-spacing: 3px;
        color: #fff;
    }

    .bottom-meta-dates .sep {
        color: #FDED3A;
        margin: 0 8px;
    }

    .bottom-meta-venue {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 22px;
        font-weight: 400;
        color: rgba(255,255,255,0.85);
        text-align: right;
    }

    /* ── Flag styles ─────────────────────────────────── */
    .team-flag {
        width: 28px;
        height: 18px;
        object-fit: cover;
        border-radius: 2px;
        flex-shrink: 0;
    }

    /* Per-team shield overrides */
    .slide[data-id="seleccion_asturiana"] .shield-img { transform: scale(0.88); }

    /* ── Overview slide (all teams) ────────────────────── */
    .poster.overview {
        background: radial-gradient(circle at 20% 0%, #1a1a2e 0%, #000 60%);
        display: flex;
        flex-direction: column;
    }

    .poster.overview::before {
        content: '';
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.18) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .poster.overview::after {
        content: '';
        position: absolute;
        bottom: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.10) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .ov-header {
        text-align: center;
        padding: 65px 60px 35px;
        position: relative;
        z-index: 2;
    }

    .ov-logo {
        width: 130px;
        height: 130px;
        margin: 0 auto 22px;
        display: block;
        object-fit: contain;
    }

    .ov-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 130px;
        line-height: 0.95;
        letter-spacing: 4px;
        margin-bottom: 30px;
        color: #fff;
    }

    .ov-title-roman {
        color: #FDED3A;
        display: block;
        font-size: 110px;
        line-height: 1;
    }

    .ov-meta {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 34px;
        border: 2px solid rgba(253,237,58,0.4);
        border-radius: 26px;
        text-transform: uppercase;
        margin-top: 8px;
    }

    .ov-meta-days {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        letter-spacing: 8px;
        color: #FDED3A;
        line-height: 1;
        display: flex;
        gap: 18px;
        align-items: center;
    }

    .ov-meta-days .sep {
        color: rgba(255,255,255,0.35);
        font-weight: 400;
        margin: 0 -6px;
    }

    .ov-meta-month {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 6px;
        color: #fff;
    }

    .ov-section-title {
        text-align: center;
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.55);
        letter-spacing: 6px;
        text-transform: uppercase;
        margin: 30px 0 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        position: relative;
        z-index: 2;
    }

    .ov-section-title::before,
    .ov-section-title::after {
        content: '';
        height: 1px;
        flex: 0 0 80px;
        background: linear-gradient(90deg, transparent, rgba(253,237,58,0.5));
    }

    .ov-section-title::after {
        background: linear-gradient(90deg, rgba(253,237,58,0.5), transparent);
    }

    .ov-teams {
        flex: 1;
        padding: 0 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 35px 30px;
        align-content: center;
        position: relative;
        z-index: 2;
    }

    .ov-team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }

    .ov-team-shield {
        width: 150px;
        height: 150px;
        object-fit: contain;
        background: rgba(255,255,255,0.06);
        border-radius: 18px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    /* Vetusta and Selección Asturiana stay at the previous 130px size */
    .ov-team[data-id="bm_vetusta"] .ov-team-shield,
    .ov-team[data-id="seleccion_asturiana"] .ov-team-shield {
        width: 130px;
        height: 130px;
    }

    .ov-team-name {
        font-size: 14px;
        font-weight: 700;
        text-align: center;
        line-height: 1.25;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #fff;
        max-width: 160px;
    }

    .ov-footer {
        padding: 30px 60px 50px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    .ov-footer-categories {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 22px;
    }

    .ov-category-pill {
        background: rgba(253,237,58,0.12);
        color: #FDED3A;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 8px 18px;
        border-radius: 999px;
        text-transform: uppercase;
    }

    .ov-footer-venue {
        font-size: 16px;
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .ov-footer-venue strong { color: #fff; }
</style>
</head>
<body>
<div class="page">
    <div class="stage-outer">
        <button id="prev-btn" class="nav-arrow prev" type="button" aria-label="Anterior">‹</button>
        <button id="next-btn" class="nav-arrow next" type="button" aria-label="Siguiente">›</button>
        <div class="stage-wrap">
            <div class="stage">
                <div class="slides" id="slides"></div>
            </div>
        </div>
    </div>
</div>

<div class="download-cluster">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar este</button>
    <button id="download-all-btn" class="download-all-btn" type="button">⬇ Descargar todos</button>
</div>

<script>
// Order: more categories first; for ties, Asturian teams go last
// Set 'blend: true' for shields with white/light backgrounds we want to flatten
var TEAMS = [
    { id: 'egia_eskubaloia',      name: 'Egia Eskubaloia',      city: 'Guipúzcoa', flag: '../src/assets/banderas/pais_vasco.svg',      shield: '../src/assets/escudo_egia_eskubaloia.png',     cats: ['Cadete Femenino','Cadete Masculino','Infantil Masculino'] },
    { id: 'bm_chinchon',          name: 'BM Chinchón',          city: 'Madrid',    flag: '../src/assets/banderas/madrid.svg',          shield: '../src/assets/escudo_bm_chinchon.png',         cats: ['Cadete Masculino','Infantil Masculino'] },
    { id: 'seleccion_asturiana',  name: 'Selección Asturiana',  city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_seleccion_asturiana.png', cats: ['Cadete Femenino','Cadete Masculino'] },
    { id: 'cd_balopal',           name: 'CD Balopal',           city: 'Palencia',  flag: '../src/assets/banderas/castilla_y_leon.svg', shield: '../src/assets/escudo_cd_balopal.png',          cats: ['Infantil Masculino'] },
    { id: 'bm_cidade_das_burgas', name: 'BM Cidade das Burgas', city: 'Ourense',   flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_cidade_das_burgas.png',cats: ['Infantil Masculino'] },
    { id: 'bm_xallas',            name: 'BM Xallas',            city: 'A Coruña',  flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_xallas.png',           cats: ['Cadete Femenino'] },
    { id: 'deportivo_estadio',    name: 'Deportivo Estadio',    city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_deportivoestadio.png',    cats: ['Cadete Masculino'] }
];

function pinSvg() {
    return '<svg viewBox="0 0 24 24"><path d="M12 0C7.58 0 4 3.58 4 8c0 5.5 8 16 8 16s8-10.5 8-16c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>';
}

/* ── Oviedo's visual identity, redrawn as SVG ────────────────────────
   These graphics are the visual references that identify Oviedo —
   not generic decorations. They are what a designer working for a
   club from this city would research and incorporate.

   - CRUZ_VICTORIA_SVG: the Cruz de la Victoria, the gold cross kept in
     the Cámara Santa of the Oviedo Cathedral. Symbol of the Principado
     de Asturias. Distinctive shape: each arm ends in a trefoil and the
     Greek letters Α (alpha) and Ω (omega) hang from the horizontal
     arms on small chains.
   - CATHEDRAL_SVG: the gothic Torre de San Salvador, Oviedo Cathedral's
     tower — the city's most recognisable skyline silhouette.
   - NARANCO_SVG: Santa María del Naranco, the pre-Romanesque palace
     on Monte Naranco. UNESCO World Heritage. Distinctive arched
     loggia front. */

var CRUZ_VICTORIA_SVG = '' +
    '<svg viewBox="0 0 420 620" xmlns="http://www.w3.org/2000/svg" fill="currentColor">' +
        /* Vertical arm */
        '<rect x="190" y="100" width="40" height="320"/>' +
        /* Horizontal arm */
        '<rect x="80" y="240" width="260" height="40"/>' +

        /* Top trefoil — three lobes */
        '<circle cx="210" cy="90" r="22"/>' +
        '<circle cx="188" cy="108" r="14"/>' +
        '<circle cx="232" cy="108" r="14"/>' +
        '<rect x="194" y="100" width="32" height="22"/>' +

        /* Bottom trefoil */
        '<circle cx="210" cy="430" r="22"/>' +
        '<circle cx="188" cy="412" r="14"/>' +
        '<circle cx="232" cy="412" r="14"/>' +
        '<rect x="194" y="398" width="32" height="22"/>' +

        /* Left trefoil */
        '<circle cx="70" cy="260" r="22"/>' +
        '<circle cx="88" cy="238" r="14"/>' +
        '<circle cx="88" cy="282" r="14"/>' +
        '<rect x="78" y="244" width="22" height="32"/>' +

        /* Right trefoil */
        '<circle cx="350" cy="260" r="22"/>' +
        '<circle cx="332" cy="238" r="14"/>' +
        '<circle cx="332" cy="282" r="14"/>' +
        '<rect x="320" y="244" width="22" height="32"/>' +

        /* Cabochons (gems) inset along the vertical arm */
        '<circle cx="210" cy="150" r="6" fill="#0a0a14"/>' +
        '<circle cx="210" cy="190" r="6" fill="#0a0a14"/>' +
        '<circle cx="210" cy="320" r="6" fill="#0a0a14"/>' +
        '<circle cx="210" cy="370" r="6" fill="#0a0a14"/>' +
        /* Central cabochon at the crossing */
        '<circle cx="210" cy="260" r="10" fill="#0a0a14"/>' +
        '<circle cx="210" cy="260" r="5" fill="currentColor"/>' +
        /* Cabochons along the horizontal arm */
        '<circle cx="130" cy="260" r="6" fill="#0a0a14"/>' +
        '<circle cx="170" cy="260" r="6" fill="#0a0a14"/>' +
        '<circle cx="250" cy="260" r="6" fill="#0a0a14"/>' +
        '<circle cx="290" cy="260" r="6" fill="#0a0a14"/>' +

        /* Hanging chains for Α and Ω */
        '<rect x="129" y="280" width="2" height="56"/>' +
        '<rect x="289" y="280" width="2" height="56"/>' +
        /* Small rings where the letters hang */
        '<circle cx="130" cy="340" r="4" fill="none" stroke="currentColor" stroke-width="2"/>' +
        '<circle cx="290" cy="340" r="4" fill="none" stroke="currentColor" stroke-width="2"/>' +

        /* Greek letters Α and Ω — serif drawn paths */
        /* Alpha */
        '<path d="M 110 410 L 130 360 L 150 410 L 144 410 L 138 396 L 122 396 L 116 410 Z M 125 388 L 135 388 L 130 374 Z"/>' +
        /* Omega */
        '<path d="M 270 410 L 270 400 Q 270 360 290 360 Q 310 360 310 400 L 310 410 L 304 410 L 304 400 Q 304 370 290 370 Q 276 370 276 400 L 276 410 Z M 268 410 L 282 410 L 282 402 L 268 402 Z M 298 410 L 312 410 L 312 402 L 298 402 Z"/>' +
    '</svg>';

var CATHEDRAL_SVG = '' +
    '<svg viewBox="0 0 220 820" xmlns="http://www.w3.org/2000/svg" fill="currentColor">' +
        /* Cross atop the spire */
        '<rect x="106" y="0" width="8" height="36"/>' +
        '<rect x="94" y="12" width="32" height="6"/>' +
        '<circle cx="110" cy="40" r="6"/>' +

var NARANCO_SVG = '' +
    '<svg viewBox="0 0 360 220" xmlns="http://www.w3.org/2000/svg" fill="currentColor">' +
        /* Stepped tile roof */
        '<path d="M 24 60 L 60 24 L 300 24 L 336 60 L 336 70 L 24 70 Z"/>' +

        '<rect x="24" y="70" width="312" height="80"/>' +
        '<path d="M 60 88 Q 60 70 90 70 Q 120 70 120 88 L 120 150 L 60 150 Z" fill="#0a0a14"/>' +
        '<path d="M 150 88 Q 150 70 180 70 Q 210 70 210 88 L 210 150 L 150 150 Z" fill="#0a0a14"/>' +
        '<path d="M 240 88 Q 240 70 270 70 Q 300 70 300 88 L 300 150 L 240 150 Z" fill="#0a0a14"/>' +
        /* String course */
        '<rect x="14" y="150" width="332" height="8"/>' +
        /* Lower level */
        '<rect x="24" y="158" width="312" height="62"/>' +

        '<rect x="14" y="60" width="10" height="160"/>' +
        '<rect x="336" y="60" width="10" height="160"/>' +

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

function nameSizeClass(name) {
    // Find longest word
    var longest = (name || '').split(/\s+/).reduce(function(a, b) { return a.length > b.length ? a : b; }, '');
    if (longest.length >= 11) return 'team-name size-4';
    if (longest.length >= 9) return 'team-name size-3';
    if (longest.length >= 7) return 'team-name size-2';
    return 'team-name';
}

// Names that need a manual line-break to fit the overview grid cell (~160px wide)
var OV_NAME_BREAKS = {
    'BM Cidade das Burgas': 'BM Cidade<br>das Burgas',
    'Egia Eskubaloia':      'Egia<br>Eskubaloia',
    'Selección Asturiana':  'Selección<br>Asturiana',
    'Deportivo Estadio':    'Deportivo<br>Estadio'
};

function renderOverviewSlide() {
    var cats = ['Cadete Femenino','Cadete Masculino','Infantil Masculino']
        .map(function(c) { return '<span class="ov-category-pill">' + c + '</span>'; })
        .join('');
    var teamItems = TEAMS.map(function(t) {
        var nameHtml = OV_NAME_BREAKS[t.name] || escapeHtml(t.name);
        return '<div class="ov-team" data-id="' + t.id + '">' +
            '<img src="' + t.shield + '" class="ov-team-shield" alt="">' +
            '<div class="ov-team-name">' + nameHtml + '</div>' +
        '</div>';
    }).join('');
    return '<div class="slide active" data-id="overview">' +
        '<div class="poster overview">' +
            '<div class="ov-header">' +
                '<img src="../src/assets/escudo.png" class="ov-logo" alt="">' +
                '<h1 class="ov-title">' +
                    '<span class="ov-title-roman">III TORNEO</span>' +
                    'BM VETUSTA' +
                '</h1>' +
                '<div class="ov-meta">' +
                    '<div class="ov-meta-days">' +
                        '<span>19</span><span class="sep">·</span><span>20</span><span class="sep">·</span><span>21</span>' +
                    '</div>' +
                    '<div class="ov-meta-month">Junio 2026</div>' +
                '</div>' +
            '</div>' +
            '<div class="ov-section-title">Equipos participantes</div>' +
            '<div class="ov-teams">' + teamItems + '</div>' +
            '<div class="ov-footer">' +
                '<div class="ov-footer-categories">' + cats + '</div>' +
                '<div class="ov-footer-venue">Florida Arena <strong>·</strong> Pabellón Vallobín <strong>·</strong> Oviedo</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function renderSlide(team, index) {
    var cats = team.cats.map(function(c) {
        return '<span class="category-pill">' + escapeHtml(c) + '</span>';
    }).join('<span class="category-sep">·</span>');
    return '<div class="slide' + (index === 0 ? ' active' : '') + '" data-id="' + team.id + '">' +
        '<div class="poster">' +
            '<div class="poster-cruz">' + CRUZ_VICTORIA_SVG + '</div>' +
            '<div class="poster-cathedral">' + CATHEDRAL_SVG + '</div>' +
            '<div class="poster-naranco">' + NARANCO_SVG + '</div>' +

            '<div class="top-bar">' +
                '<img src="../src/assets/escudo.png" class="top-logo" alt="">' +
                '<div class="top-brand-text">' +
                    '<div class="top-brand-eyebrow">III Torneo Nacional</div>' +
                    '<div class="top-brand-title">Balonmano <span class="vetusta-serif">Vetusta</span></div>' +
                '</div>' +
            '</div>' +

            '<div class="center">' +
                '<div class="shield-stage">' +
                    '<div class="shield-disc">' +
                        '<img src="' + team.shield + '" class="shield-img" alt="">' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="name-block">' +
                '<div class="' + nameSizeClass(team.name) + '">' + escapeHtml(team.name) + '</div>' +
                '<div class="team-city">' +
                    (team.flag ? '<img src="' + team.flag + '" class="team-flag" alt="">' : pinSvg()) +
                    escapeHtml(team.city) +
                '</div>' +
            '</div>' +

            '<div class="bottom">' +
                '<div class="categories">' + cats + '</div>' +
                '<div class="bottom-meta">' +
                    '<div class="bottom-meta-dates">' +
                        '19<span class="sep">·</span>20<span class="sep">·</span>21 Junio 2026' +
                    '</div>' +
                    '<div class="bottom-meta-venue">Florida Arena · Oviedo</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

var slidesEl = document.getElementById('slides');
slidesEl.innerHTML = TEAMS.map(renderSlide).join('');
var slides = slidesEl.querySelectorAll('.slide');
var current = 0;

// Filename for each slide's downloaded PNG
function slideFilename(i) {
    return 'cartel-' + TEAMS[i].id + '.png';
}

// Responsive scale: fit 1080x1350 cartel into viewport
// Leave room for the side arrows and slide-info caption
function updateScale() {
    var availW = window.innerWidth - 140;  // 56px arrows + safety margin both sides
    var availH = window.innerHeight - 100; // info caption + padding
    var scale = Math.min(availW / 1080, availH / 1350, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var dlBtn = document.getElementById('download-btn');
var dlAllBtn = document.getElementById('download-all-btn');

function show(i) {
    current = ((i % slides.length) + slides.length) % slides.length;
    slides.forEach(function(s, idx) { s.classList.toggle('active', idx === current); });
}

prevBtn.addEventListener('click', function() { show(current - 1); });
nextBtn.addEventListener('click', function() { show(current + 1); });
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function captureSlide(slideEl) {
    return html2canvas(slideEl.querySelector('.poster'), {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1080,
        height: 1350,
        windowWidth: 1080,
        windowHeight: 1350
    });
}

function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

dlBtn.addEventListener('click', function() {
    dlBtn.disabled = true;
    var label = dlBtn.textContent;
    dlBtn.textContent = 'Generando…';
    var slide = slides[current];
    slide.classList.add('active');
    captureSlide(slide).then(function(canvas) {
        canvas.toBlob(function(blob) {
            triggerDownload(blob, slideFilename(current));
            dlBtn.disabled = false;
            dlBtn.textContent = label;
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('Error al generar la imagen.');
        dlBtn.disabled = false;
        dlBtn.textContent = label;
    });
});

dlAllBtn.addEventListener('click', async function() {
    dlAllBtn.disabled = true;
    var origLabel = dlAllBtn.textContent;
    for (var i = 0; i < slides.length; i++) {
        dlAllBtn.textContent = 'Generando ' + (i + 1) + ' / ' + slides.length + '…';
        slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
        await new Promise(function(r) { setTimeout(r, 120); });
        try {
            var canvas = await captureSlide(slides[i]);
            var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
            triggerDownload(blob, slideFilename(i));
            await new Promise(function(r) { setTimeout(r, 200); });
        } catch (e) {
            console.error(e);
        }
    }
    show(current);
    dlAllBtn.disabled = false;
    dlAllBtn.textContent = origLabel;
});
</script>
