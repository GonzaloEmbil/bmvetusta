<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carteles equipos · III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #0c0c14;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* Side nav buttons (prev/next) */
    .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(31,31,46,0.9);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 26px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.2s;
        z-index: 20;
        backdrop-filter: blur(8px);
    }
    .nav-arrow:hover {
        background: #FDED3A;
        color: #0a0a1a;
    }
    .nav-arrow.prev { left: -28px; }
    .nav-arrow.next { right: -28px; }
    @media (max-width: 720px) {
        .nav-arrow { width: 44px; height: 44px; font-size: 20px; }
        .nav-arrow.prev { left: -10px; }
        .nav-arrow.next { right: -10px; }
    }

    .stage-outer {
        position: relative;
        display: inline-block;
    }

    /* Download buttons fixed bottom-right */
    .download-cluster {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 30;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a1a;
        border: 0;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 22px rgba(253,237,58,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        white-space: nowrap;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(253,237,58,0.5);
    }
    .download-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }

    .download-all-btn {
        background: rgba(31,31,46,0.92);
        color: #FDED3A;
        border: 1px solid #FDED3A;
        padding: 12px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }
    .download-all-btn:hover { background: #FDED3A; color: #0a0a1a; }
    .download-all-btn:disabled { opacity: 0.6; cursor: wait; }

    .slide-info {
        color: rgba(255,255,255,0.7);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* ── Stage ─────────────────────────────────────────── */
    :root {
        --scale: 1;
    }

    .stage-wrap {
        width: calc(1080px * var(--scale));
        height: calc(1350px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        border-radius: 8px;
        overflow: hidden;
    }

    .stage {
        width: 1080px;
        height: 1350px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .slides { position: relative; width: 100%; height: 100%; }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
    }
    .slide.active { opacity: 1; visibility: visible; }

    /* ── Poster ────────────────────────────────────────── */
    .poster {
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #fff;
        position: relative;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* Cathedral spire silhouette — Torre de San Salvador, the Vetusta
       reference. Drawn as SVG; sits as a vertical anchor behind/around
       the team shield. */
    .poster-cathedral {
        position: absolute;
        left: 50%;
        top: 130px;
        transform: translateX(-50%);
        width: 240px;
        height: 980px;
        color: rgba(253,237,58,0.07);
        z-index: 1;
        pointer-events: none;
    }
    .poster-cathedral svg { width: 100%; height: 100%; display: block; }

    /* Handball court arcs — 9m dashed + 6m solid + goal line. Drawn at the
       bottom edge of the poster like the goal area seen from above. */
    .poster-court {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 280px;
        z-index: 2;
        pointer-events: none;
    }
    .poster-court svg { width: 100%; height: 100%; display: block; }

    /* Custom roman III mark — three classical Roman strokes with serifs */
    .poster-iii {
        position: absolute;
        top: 84px;
        right: 80px;
        width: 132px;
        height: 168px;
        z-index: 4;
        color: #FDED3A;
    }
    .poster-iii svg { width: 100%; height: 100%; display: block; }

    /* Handball ball — small decorative SVG */
    .poster-ball {
        position: absolute;
        left: 80px;
        bottom: 96px;
        width: 64px;
        height: 64px;
        z-index: 6;
        opacity: 0.85;
    }
    .poster-ball svg { width: 100%; height: 100%; display: block; }

    /* ── Top bar ───────────────────────────────────────── */
    .top-bar {
        position: absolute;
        top: 90px;
        left: 90px;
        right: 230px;          /* leave room for the III mark on the right */
        display: flex;
        align-items: center;
        gap: 22px;
        z-index: 5;
    }

    .top-logo {
        width: 88px;
        height: 88px;
        object-fit: contain;
        flex-shrink: 0;
    }

    .top-brand-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1;
    }

    .top-brand-eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 5px;
        color: rgba(255,255,255,0.55);
        text-transform: uppercase;
    }

    .top-brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 48px;
        line-height: 1;
        letter-spacing: 2px;
        color: #fff;
    }

    /* The 'Vetusta' word inside the brand title is set in Playfair Display
       italic — paying homage to Clarín's literary name for Oviedo. */
    .vetusta-serif {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-weight: 700;
        letter-spacing: -1px;
        color: #FDED3A;
        text-transform: none;
        font-size: 0.82em;
        margin-left: 6px;
    }

    /* ── Center: shield ────────────────────────────────── */
    .center {
        position: absolute;
        top: 320px;
        left: 0;
        right: 0;
        z-index: 3;
        text-align: center;
        padding: 0 90px;
    }

    .shield-stage {
        width: 480px;
        height: 480px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .shield-disc {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .shield-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    /* Team name + city block — sits between the shield and the court */
    .name-block {
        position: absolute;
        left: 90px;
        right: 90px;
        bottom: 360px;
        text-align: center;
        z-index: 5;
    }

    .team-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 124px;
        line-height: 0.88;
        letter-spacing: 1px;
        color: #fff;
        text-transform: uppercase;
        margin-bottom: 16px;
    }
    .team-name.size-2 { font-size: 108px; }
    .team-name.size-3 { font-size: 90px; }
    .team-name.size-4 { font-size: 74px; }

    .team-city {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 26px;
        font-weight: 400;
        color: rgba(255,255,255,0.85);
    }

    .team-city svg {
        width: 18px;
        height: 18px;
        fill: #FDED3A;
        flex-shrink: 0;
    }

    /* ── Footer (sits inside the court arcs zone) ──────── */
    .bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 90px 70px;
        z-index: 5;
    }

    .categories {
        font-family: 'Inter', sans-serif;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 4px;
        color: rgba(255,255,255,0.7);
        text-transform: uppercase;
        margin-bottom: 26px;
        line-height: 1;
        text-align: center;
    }

    .category-sep {
        color: #FDED3A;
        margin: 0 12px;
    }

    .bottom-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 32px;
        line-height: 1;
    }

    .bottom-meta-dates {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        letter-spacing: 3px;
        color: #fff;
    }

    .bottom-meta-dates .sep {
        color: #FDED3A;
        margin: 0 8px;
    }

    .bottom-meta-venue {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 22px;
        font-weight: 400;
        color: rgba(255,255,255,0.85);
        text-align: right;
    }

    /* ── Flag styles ─────────────────────────────────── */
    .team-flag {
        width: 28px;
        height: 18px;
        object-fit: cover;
        border-radius: 2px;
        flex-shrink: 0;
    }

    /* Per-team shield overrides */
    .slide[data-id="seleccion_asturiana"] .shield-img { transform: scale(0.88); }

    /* ── Overview slide (all teams) ────────────────────── */
    .poster.overview {
        background: radial-gradient(circle at 20% 0%, #1a1a2e 0%, #000 60%);
        display: flex;
        flex-direction: column;
    }

    .poster.overview::before {
        content: '';
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.18) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .poster.overview::after {
        content: '';
        position: absolute;
        bottom: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.10) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .ov-header {
        text-align: center;
        padding: 65px 60px 35px;
        position: relative;
        z-index: 2;
    }

    .ov-logo {
        width: 130px;
        height: 130px;
        margin: 0 auto 22px;
        display: block;
        object-fit: contain;
    }

    .ov-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 130px;
        line-height: 0.95;
        letter-spacing: 4px;
        margin-bottom: 30px;
        color: #fff;
    }

    .ov-title-roman {
        color: #FDED3A;
        display: block;
        font-size: 110px;
        line-height: 1;
    }

    .ov-meta {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 34px;
        border: 2px solid rgba(253,237,58,0.4);
        border-radius: 26px;
        text-transform: uppercase;
        margin-top: 8px;
    }

    .ov-meta-days {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        letter-spacing: 8px;
        color: #FDED3A;
        line-height: 1;
        display: flex;
        gap: 18px;
        align-items: center;
    }

    .ov-meta-days .sep {
        color: rgba(255,255,255,0.35);
        font-weight: 400;
        margin: 0 -6px;
    }

    .ov-meta-month {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 6px;
        color: #fff;
    }

    .ov-section-title {
        text-align: center;
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.55);
        letter-spacing: 6px;
        text-transform: uppercase;
        margin: 30px 0 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        position: relative;
        z-index: 2;
    }

    .ov-section-title::before,
    .ov-section-title::after {
        content: '';
        height: 1px;
        flex: 0 0 80px;
        background: linear-gradient(90deg, transparent, rgba(253,237,58,0.5));
    }

    .ov-section-title::after {
        background: linear-gradient(90deg, rgba(253,237,58,0.5), transparent);
    }

    .ov-teams {
        flex: 1;
        padding: 0 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 35px 30px;
        align-content: center;
        position: relative;
        z-index: 2;
    }

    .ov-team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }

    .ov-team-shield {
        width: 150px;
        height: 150px;
        object-fit: contain;
        background: rgba(255,255,255,0.06);
        border-radius: 18px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    /* Vetusta and Selección Asturiana stay at the previous 130px size */
    .ov-team[data-id="bm_vetusta"] .ov-team-shield,
    .ov-team[data-id="seleccion_asturiana"] .ov-team-shield {
        width: 130px;
        height: 130px;
    }

    .ov-team-name {
        font-size: 14px;
        font-weight: 700;
        text-align: center;
        line-height: 1.25;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #fff;
        max-width: 160px;
    }

    .ov-footer {
        padding: 30px 60px 50px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    .ov-footer-categories {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 22px;
    }

    .ov-category-pill {
        background: rgba(253,237,58,0.12);
        color: #FDED3A;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 8px 18px;
        border-radius: 999px;
        text-transform: uppercase;
    }

    .ov-footer-venue {
        font-size: 16px;
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .ov-footer-venue strong { color: #fff; }
</style>
</head>
<body>
<div class="page">
    <div class="stage-outer">
        <button id="prev-btn" class="nav-arrow prev" type="button" aria-label="Anterior">‹</button>
        <button id="next-btn" class="nav-arrow next" type="button" aria-label="Siguiente">›</button>
        <div class="stage-wrap">
            <div class="stage">
                <div class="slides" id="slides"></div>
            </div>
        </div>
    </div>
</div>

<div class="download-cluster">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar este</button>
    <button id="download-all-btn" class="download-all-btn" type="button">⬇ Descargar todos</button>
</div>

<script>
// Order: more categories first; for ties, Asturian teams go last
// Set 'blend: true' for shields with white/light backgrounds we want to flatten
var TEAMS = [
    { id: 'egia_eskubaloia',      name: 'Egia Eskubaloia',      city: 'Guipúzcoa', flag: '../src/assets/banderas/pais_vasco.svg',      shield: '../src/assets/escudo_egia_eskubaloia.png',     cats: ['Cadete Femenino','Cadete Masculino','Infantil Masculino'] },
    { id: 'bm_chinchon',          name: 'BM Chinchón',          city: 'Madrid',    flag: '../src/assets/banderas/madrid.svg',          shield: '../src/assets/escudo_bm_chinchon.png',         cats: ['Cadete Masculino','Infantil Masculino'] },
    { id: 'seleccion_asturiana',  name: 'Selección Asturiana',  city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_seleccion_asturiana.png', cats: ['Cadete Femenino','Cadete Masculino'] },
    { id: 'cd_balopal',           name: 'CD Balopal',           city: 'Palencia',  flag: '../src/assets/banderas/castilla_y_leon.svg', shield: '../src/assets/escudo_cd_balopal.png',          cats: ['Infantil Masculino'] },
    { id: 'bm_cidade_das_burgas', name: 'BM Cidade das Burgas', city: 'Ourense',   flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_cidade_das_burgas.png',cats: ['Infantil Masculino'] },
    { id: 'bm_xallas',            name: 'BM Xallas',            city: 'A Coruña',  flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_xallas.png',           cats: ['Cadete Femenino'] },
    { id: 'deportivo_estadio',    name: 'Deportivo Estadio',    city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_deportivoestadio.png',    cats: ['Cadete Masculino'] }
];

function pinSvg() {
    return '<svg viewBox="0 0 24 24"><path d="M12 0C7.58 0 4 3.58 4 8c0 5.5 8 16 8 16s8-10.5 8-16c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>';
}

/* ── Custom graphical elements ──────────────────────────────────────
   These SVGs are part of the poster's identity:
   - CATHEDRAL_SVG: stylised silhouette of the Torre de San Salvador
     (Oviedo Cathedral), the source of the 'Vetusta' name and the V
     of the club logo. Sits behind the team shield.
   - COURT_SVG: handball goal area (6m solid arc, 9m dashed arc,
     goal line and goal mouth) drawn at the foot of the poster.
   - III_SVG: classical roman 'III' with serif terminals, the
     edition mark for the third tournament.
   - BALL_SVG: a handball with its characteristic seam pattern. */
var CATHEDRAL_SVG = '' +
    '<svg viewBox="0 0 200 800" xmlns="http://www.w3.org/2000/svg" fill="currentColor">' +
        '<rect x="96" y="0" width="8" height="40"/>' +
        '<rect x="84" y="12" width="32" height="8"/>' +
        '<path d="M100 40 L150 200 L50 200 Z"/>' +
        '<path d="M55 200 L145 200 L150 280 L50 280 Z"/>' +
        '<rect x="32" y="240" width="14" height="80"/>' +
        '<path d="M32 232 L46 232 L39 212 Z"/>' +
        '<rect x="154" y="240" width="14" height="80"/>' +
        '<path d="M154 232 L168 232 L161 212 Z"/>' +
        '<rect x="60" y="280" width="80" height="320"/>' +
        '<path d="M85 330 Q85 315 100 315 Q115 315 115 330 L115 500 L85 500 Z" fill="#0a0a14"/>' +
        '<rect x="50" y="600" width="100" height="40"/>' +
        '<rect x="40" y="640" width="120" height="160"/>' +
    '</svg>';

var COURT_SVG = '' +
    '<svg viewBox="0 0 1080 280" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#FDED3A" stroke-linecap="round">' +
        '<path d="M 60 280 A 460 460 0 0 1 1020 280" stroke-width="3" stroke-dasharray="14 10" opacity="0.55"/>' +
        '<path d="M 220 280 A 320 320 0 0 1 860 280" stroke-width="4" opacity="0.85"/>' +
        '<line x1="0" y1="278" x2="1080" y2="278" stroke-width="4"/>' +
        '<rect x="500" y="252" width="80" height="26" stroke-width="3"/>' +
    '</svg>';

var III_SVG = '' +
    '<svg viewBox="0 0 132 168" xmlns="http://www.w3.org/2000/svg" fill="currentColor">' +
        '<rect x="0" y="0" width="36" height="12"/><rect x="13" y="0" width="10" height="168"/><rect x="0" y="156" width="36" height="12"/>' +
        '<rect x="48" y="0" width="36" height="12"/><rect x="61" y="0" width="10" height="168"/><rect x="48" y="156" width="36" height="12"/>' +
        '<rect x="96" y="0" width="36" height="12"/><rect x="109" y="0" width="10" height="168"/><rect x="96" y="156" width="36" height="12"/>' +
    '</svg>';

var BALL_SVG = '' +
    '<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#FDED3A" stroke-width="2.4">' +
        '<circle cx="32" cy="32" r="28" fill="#0a0a14"/>' +
        '<path d="M 4 32 Q 18 18 32 32 Q 46 46 60 32"/>' +
        '<path d="M 4 32 Q 18 46 32 32 Q 46 18 60 32"/>' +
        '<path d="M 32 4 Q 18 18 32 32 Q 46 46 32 60"/>' +
        '<path d="M 32 4 Q 46 18 32 32 Q 18 46 32 60"/>' +
    '</svg>';

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

function nameSizeClass(name) {
    // Find longest word
    var longest = (name || '').split(/\s+/).reduce(function(a, b) { return a.length > b.length ? a : b; }, '');
    if (longest.length >= 11) return 'team-name size-4';
    if (longest.length >= 9) return 'team-name size-3';
    if (longest.length >= 7) return 'team-name size-2';
    return 'team-name';
}

// Names that need a manual line-break to fit the overview grid cell (~160px wide)
var OV_NAME_BREAKS = {
    'BM Cidade das Burgas': 'BM Cidade<br>das Burgas',
    'Egia Eskubaloia':      'Egia<br>Eskubaloia',
    'Selección Asturiana':  'Selección<br>Asturiana',
    'Deportivo Estadio':    'Deportivo<br>Estadio'
};

function renderOverviewSlide() {
    var cats = ['Cadete Femenino','Cadete Masculino','Infantil Masculino']
        .map(function(c) { return '<span class="ov-category-pill">' + c + '</span>'; })
        .join('');
    var teamItems = TEAMS.map(function(t) {
        var nameHtml = OV_NAME_BREAKS[t.name] || escapeHtml(t.name);
        return '<div class="ov-team" data-id="' + t.id + '">' +
            '<img src="' + t.shield + '" class="ov-team-shield" alt="">' +
            '<div class="ov-team-name">' + nameHtml + '</div>' +
        '</div>';
    }).join('');
    return '<div class="slide active" data-id="overview">' +
        '<div class="poster overview">' +
            '<div class="ov-header">' +
                '<img src="../src/assets/escudo.png" class="ov-logo" alt="">' +
                '<h1 class="ov-title">' +
                    '<span class="ov-title-roman">III TORNEO</span>' +
                    'BM VETUSTA' +
                '</h1>' +
                '<div class="ov-meta">' +
                    '<div class="ov-meta-days">' +
                        '<span>19</span><span class="sep">·</span><span>20</span><span class="sep">·</span><span>21</span>' +
                    '</div>' +
                    '<div class="ov-meta-month">Junio 2026</div>' +
                '</div>' +
            '</div>' +
            '<div class="ov-section-title">Equipos participantes</div>' +
            '<div class="ov-teams">' + teamItems + '</div>' +
            '<div class="ov-footer">' +
                '<div class="ov-footer-categories">' + cats + '</div>' +
                '<div class="ov-footer-venue">Florida Arena <strong>·</strong> Pabellón Vallobín <strong>·</strong> Oviedo</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function renderSlide(team, index) {
    var cats = team.cats.map(function(c) {
        return '<span class="category-pill">' + escapeHtml(c) + '</span>';
    }).join('<span class="category-sep">·</span>');
    return '<div class="slide' + (index === 0 ? ' active' : '') + '" data-id="' + team.id + '">' +
        '<div class="poster">' +
            '<div class="poster-cathedral">' + CATHEDRAL_SVG + '</div>' +
            '<div class="poster-court">' + COURT_SVG + '</div>' +
            '<div class="poster-iii">' + III_SVG + '</div>' +
            '<div class="poster-ball">' + BALL_SVG + '</div>' +

            '<div class="top-bar">' +
                '<img src="../src/assets/escudo.png" class="top-logo" alt="">' +
                '<div class="top-brand-text">' +
                    '<div class="top-brand-eyebrow">III Torneo Nacional</div>' +
                    '<div class="top-brand-title">Balonmano <span class="vetusta-serif">Vetusta</span></div>' +
                '</div>' +
            '</div>' +

            '<div class="center">' +
                '<div class="shield-stage">' +
                    '<div class="shield-disc">' +
                        '<img src="' + team.shield + '" class="shield-img" alt="">' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="name-block">' +
                '<div class="' + nameSizeClass(team.name) + '">' + escapeHtml(team.name) + '</div>' +
                '<div class="team-city">' +
                    (team.flag ? '<img src="' + team.flag + '" class="team-flag" alt="">' : pinSvg()) +
                    escapeHtml(team.city) +
                '</div>' +
            '</div>' +

            '<div class="bottom">' +
                '<div class="categories">' + cats + '</div>' +
                '<div class="bottom-meta">' +
                    '<div class="bottom-meta-dates">' +
                        '19<span class="sep">·</span>20<span class="sep">·</span>21 Junio 2026' +
                    '</div>' +
                    '<div class="bottom-meta-venue">Florida Arena · Oviedo</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

var slidesEl = document.getElementById('slides');
slidesEl.innerHTML = TEAMS.map(renderSlide).join('');
var slides = slidesEl.querySelectorAll('.slide');
var current = 0;

// Filename for each slide's downloaded PNG
function slideFilename(i) {
    return 'cartel-' + TEAMS[i].id + '.png';
}

// Responsive scale: fit 1080x1350 cartel into viewport
// Leave room for the side arrows and slide-info caption
function updateScale() {
    var availW = window.innerWidth - 140;  // 56px arrows + safety margin both sides
    var availH = window.innerHeight - 100; // info caption + padding
    var scale = Math.min(availW / 1080, availH / 1350, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var dlBtn = document.getElementById('download-btn');
var dlAllBtn = document.getElementById('download-all-btn');

function show(i) {
    current = ((i % slides.length) + slides.length) % slides.length;
    slides.forEach(function(s, idx) { s.classList.toggle('active', idx === current); });
}

prevBtn.addEventListener('click', function() { show(current - 1); });
nextBtn.addEventListener('click', function() { show(current + 1); });
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function captureSlide(slideEl) {
    return html2canvas(slideEl.querySelector('.poster'), {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1080,
        height: 1350,
        windowWidth: 1080,
        windowHeight: 1350
    });
}

function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

dlBtn.addEventListener('click', function() {
    dlBtn.disabled = true;
    var label = dlBtn.textContent;
    dlBtn.textContent = 'Generando…';
    var slide = slides[current];
    slide.classList.add('active');
    captureSlide(slide).then(function(canvas) {
        canvas.toBlob(function(blob) {
            triggerDownload(blob, slideFilename(current));
            dlBtn.disabled = false;
            dlBtn.textContent = label;
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('Error al generar la imagen.');
        dlBtn.disabled = false;
        dlBtn.textContent = label;
    });
});

dlAllBtn.addEventListener('click', async function() {
    dlAllBtn.disabled = true;
    var origLabel = dlAllBtn.textContent;
    for (var i = 0; i < slides.length; i++) {
        dlAllBtn.textContent = 'Generando ' + (i + 1) + ' / ' + slides.length + '…';
        slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
        await new Promise(function(r) { setTimeout(r, 120); });
        try {
            var canvas = await captureSlide(slides[i]);
            var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
            triggerDownload(blob, slideFilename(i));
            await new Promise(function(r) { setTimeout(r, 200); });
        } catch (e) {
            console.error(e);
        }
    }
    show(current);
    dlAllBtn.disabled = false;
    dlAllBtn.textContent = origLabel;
});
</script>
</body>
</html>
