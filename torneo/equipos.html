<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carteles equipos · III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #0c0c14;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* Side nav buttons (prev/next) */
    .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(31,31,46,0.9);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 26px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.2s;
        z-index: 20;
        backdrop-filter: blur(8px);
    }
    .nav-arrow:hover {
        background: #FDED3A;
        color: #0a0a1a;
    }
    .nav-arrow.prev { left: -28px; }
    .nav-arrow.next { right: -28px; }
    @media (max-width: 720px) {
        .nav-arrow { width: 44px; height: 44px; font-size: 20px; }
        .nav-arrow.prev { left: -10px; }
        .nav-arrow.next { right: -10px; }
    }

    .stage-outer {
        position: relative;
        display: inline-block;
    }

    /* Download buttons fixed bottom-right */
    .download-cluster {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 30;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a1a;
        border: 0;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 22px rgba(253,237,58,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        white-space: nowrap;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(253,237,58,0.5);
    }
    .download-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }

    .download-all-btn {
        background: rgba(31,31,46,0.92);
        color: #FDED3A;
        border: 1px solid #FDED3A;
        padding: 12px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }
    .download-all-btn:hover { background: #FDED3A; color: #0a0a1a; }
    .download-all-btn:disabled { opacity: 0.6; cursor: wait; }

    .slide-info {
        color: rgba(255,255,255,0.7);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* ── Stage ─────────────────────────────────────────── */
    :root {
        --scale: 1;
    }

    .stage-wrap {
        width: calc(1080px * var(--scale));
        height: calc(1350px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        border-radius: 8px;
        overflow: hidden;
    }

    .stage {
        width: 1080px;
        height: 1350px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .slides { position: relative; width: 100%; height: 100%; }

    .slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
    }
    .slide.active { opacity: 1; visibility: visible; }

    /* ── Poster ────────────────────────────────────────── */
    .poster {
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #fff;
        position: relative;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* Diagonal yellow accent stripe ── bottom-left so it doesn't clash with the logo */
    .poster-stripe {
        position: absolute;
        bottom: -180px;
        left: -180px;
        width: 800px;
        height: 280px;
        background: #FDED3A;
        transform: rotate(-15deg);
        z-index: 1;
    }

    .poster-stripe-dark {
        position: absolute;
        bottom: -70px;
        left: -220px;
        width: 800px;
        height: 80px;
        background: #0a0a14;
        transform: rotate(-15deg);
        z-index: 2;
    }

    /* Subtle dot grid pattern over background */
    .poster-pattern {
        position: absolute;
        inset: 0;
        background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: 32px 32px;
        opacity: 0.5;
        pointer-events: none;
        z-index: 1;
    }

    /* Decorative big-text watermark behind shield */
    .poster-watermark {
        position: absolute;
        bottom: -80px;
        left: -40px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 380px;
        line-height: 0.85;
        color: rgba(253,237,58,0.04);
        font-weight: 400;
        letter-spacing: -4px;
        pointer-events: none;
        z-index: 1;
        text-transform: uppercase;
        white-space: nowrap;
    }

    /* ── Top bar ───────────────────────────────────────── */
    .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 50px 60px 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 5;
    }

    .top-brand {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .top-brand-eyebrow {
        font-size: 12px;
        font-weight: 800;
        color: #FDED3A;
        letter-spacing: 6px;
        text-transform: uppercase;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .top-brand-eyebrow::before {
        content: '';
        width: 28px;
        height: 2px;
        background: #FDED3A;
    }

    .top-brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        line-height: 1;
        letter-spacing: 2px;
        color: #fff;
    }

    .top-brand-date {
        font-size: 12px;
        font-weight: 700;
        color: rgba(255,255,255,0.5);
        letter-spacing: 3px;
        margin-top: 4px;
        text-transform: uppercase;
    }

    .top-logo {
        width: 80px;
        height: 80px;
        object-fit: contain;
        position: relative;
        z-index: 5;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(6px);
        border-radius: 50%;
        padding: 12px;
    }

    /* ── Center ────────────────────────────────────────── */
    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 3;
        width: 90%;
    }

    .shield-stage {
        position: relative;
        width: 460px;
        height: 460px;
        margin: 0 auto 48px;
    }

    .shield-glow {
        position: absolute;
        inset: -10%;
        background: radial-gradient(circle, rgba(253,237,58,0.35) 0%, transparent 60%);
        filter: blur(40px);
        pointer-events: none;
    }

    .shield-ring {
        position: absolute;
        inset: 0;
        border: 2px solid rgba(253,237,58,0.3);
        border-radius: 50%;
    }
    .shield-ring.outer {
        inset: -28px;
        border-style: dashed;
        border-color: rgba(253,237,58,0.15);
        animation: rotate 60s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    .shield-disc {
        position: absolute;
        inset: 30px;
        background: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 50px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 6px rgba(255,255,255,0.05);
    }

    .shield-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .team-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 120px;
        line-height: 0.9;
        letter-spacing: 2px;
        color: #fff;
        text-transform: uppercase;
        margin-bottom: 16px;
        text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .team-name.size-2 { font-size: 100px; }
    .team-name.size-3 { font-size: 84px; }
    .team-name.size-4 { font-size: 70px; }

    .team-city {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(8px);
        padding: 12px 24px;
        border-radius: 999px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #fff;
    }

    .team-city svg {
        width: 18px;
        height: 18px;
        fill: #FDED3A;
        flex-shrink: 0;
    }

    /* ── Footer ────────────────────────────────────────── */
    .bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 60px 60px;
        z-index: 3;
    }

    .categories {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 32px;
    }

    .category-pill {
        background: linear-gradient(135deg, #FDED3A 0%, #f5d520 100%);
        color: #0a0a1a;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1.5px;
        padding: 12px 22px;
        border-radius: 999px;
        text-transform: uppercase;
        box-shadow: 0 4px 14px rgba(253,237,58,0.25);
    }

    .bottom-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 24px;
        border-top: 1px solid rgba(255,255,255,0.08);
    }

    .bottom-bar-left {
        font-size: 11px;
        font-weight: 800;
        color: rgba(255,255,255,0.5);
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .bottom-bar-right {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 3px;
        color: #FDED3A;
    }

    /* ── Flag styles ─────────────────────────────────── */
    .team-flag {
        width: 28px;
        height: 18px;
        object-fit: cover;
        border-radius: 3px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
        flex-shrink: 0;
    }

</style>
</head>
<body>
<div class="page">
    <div class="stage-outer">
        <button id="prev-btn" class="nav-arrow prev" type="button" aria-label="Anterior">‹</button>
        <button id="next-btn" class="nav-arrow next" type="button" aria-label="Siguiente">›</button>
        <div class="stage-wrap">
            <div class="stage">
                <div class="slides" id="slides"></div>
            </div>
        </div>
    </div>
    <div class="slide-info" id="slide-info">1 / 8</div>
</div>

<div class="download-cluster">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar este</button>
    <button id="download-all-btn" class="download-all-btn" type="button">⬇ Descargar todos</button>
</div>

<script>
// Order: more categories first; for ties, Asturian teams go last
var TEAMS = [
    { id: 'egia_eskubaloia',      name: 'Egia Eskubaloia',      city: 'Guipúzcoa', flag: '../src/assets/banderas/pais_vasco.svg',      shield: '../src/assets/escudo_egia_eskubaloia.png',     cats: ['Cadete Femenino','Cadete Masculino','Infantil Masculino'] },
    { id: 'bm_vetusta',           name: 'BM Vetusta',           city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo.png',                      cats: ['Cadete Femenino','Cadete Masculino','Infantil Masculino'] },
    { id: 'bm_chinchon',          name: 'BM Chinchón',          city: 'Madrid',    flag: '../src/assets/banderas/madrid.svg',          shield: '../src/assets/escudo_bm_chinchon.png',         cats: ['Cadete Masculino','Infantil Masculino'] },
    { id: 'seleccion_asturiana',  name: 'Selección Asturiana',  city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_seleccion_asturiana.png', cats: ['Cadete Femenino','Cadete Masculino'] },
    { id: 'cd_balopal',           name: 'CD Balopal',           city: 'Palencia',  flag: '../src/assets/banderas/castilla_y_leon.svg', shield: '../src/assets/escudo_cd_balopal.png',          cats: ['Infantil Masculino'] },
    { id: 'bm_cidade_das_burgas', name: 'BM Cidade das Burgas', city: 'Ourense',   flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_cidade_das_burgas.png',cats: ['Infantil Masculino'] },
    { id: 'bm_xallas',            name: 'BM Xallas',            city: 'A Coruña',  flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_xallas.png',           cats: ['Cadete Femenino'] },
    { id: 'deportivo_estadio',    name: 'Deportivo Estadio',    city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_deportivoestadio.png',    cats: ['Cadete Masculino'] }
];

function pinSvg() {
    return '<svg viewBox="0 0 24 24"><path d="M12 0C7.58 0 4 3.58 4 8c0 5.5 8 16 8 16s8-10.5 8-16c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>';
}

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

function nameSizeClass(name) {
    // Find longest word
    var longest = (name || '').split(/\s+/).reduce(function(a, b) { return a.length > b.length ? a : b; }, '');
    if (longest.length >= 11) return 'team-name size-4';
    if (longest.length >= 9) return 'team-name size-3';
    if (longest.length >= 7) return 'team-name size-2';
    return 'team-name';
}

function renderSlide(team, index) {
    var cats = team.cats.map(function(c) {
        return '<span class="category-pill">' + escapeHtml(c) + '</span>';
    }).join('');
    var watermark = (team.name || '').split(' ')[0].toUpperCase();
    return '<div class="slide' + (index === 0 ? ' active' : '') + '" data-id="' + team.id + '">' +
        '<div class="poster">' +
            '<div class="poster-pattern"></div>' +
            '<div class="poster-stripe"></div>' +
            '<div class="poster-stripe-dark"></div>' +
            '<div class="poster-watermark">' + escapeHtml(watermark) + '</div>' +

            '<div class="top-bar">' +
                '<div class="top-brand">' +
                    '<div class="top-brand-eyebrow">III Torneo</div>' +
                    '<div class="top-brand-title">BM Vetusta</div>' +
                    '<div class="top-brand-date">19 · 20 · 21 Junio 2026</div>' +
                '</div>' +
                '<img src="../src/assets/escudo.png" class="top-logo" alt="">' +
            '</div>' +

            '<div class="center">' +
                '<div class="shield-stage">' +
                    '<div class="shield-glow"></div>' +
                    '<div class="shield-ring outer"></div>' +
                    '<div class="shield-ring"></div>' +
                    '<div class="shield-disc">' +
                        '<img src="' + team.shield + '" class="shield-img" alt="">' +
                    '</div>' +
                '</div>' +
                '<div class="' + nameSizeClass(team.name) + '">' + escapeHtml(team.name) + '</div>' +
                '<div class="team-city">' +
                    (team.flag ? '<img src="' + team.flag + '" class="team-flag" alt="">' : pinSvg()) +
                    escapeHtml(team.city) +
                '</div>' +
            '</div>' +

            '<div class="bottom">' +
                '<div class="categories">' + cats + '</div>' +
                '<div class="bottom-bar">' +
                    '<span class="bottom-bar-left">Equipos participantes</span>' +
                    '<span class="bottom-bar-right">Oviedo · Asturias</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

var slidesEl = document.getElementById('slides');
slidesEl.innerHTML = TEAMS.map(renderSlide).join('');
var slides = slidesEl.querySelectorAll('.slide');
var current = 0;

// Responsive scale: fit 1080x1350 cartel into viewport
// Leave room for the side arrows and slide-info caption
function updateScale() {
    var availW = window.innerWidth - 140;  // 56px arrows + safety margin both sides
    var availH = window.innerHeight - 100; // info caption + padding
    var scale = Math.min(availW / 1080, availH / 1350, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var info = document.getElementById('slide-info');
var dlBtn = document.getElementById('download-btn');
var dlAllBtn = document.getElementById('download-all-btn');

function show(i) {
    current = ((i % slides.length) + slides.length) % slides.length;
    slides.forEach(function(s, idx) { s.classList.toggle('active', idx === current); });
    info.textContent = (current + 1) + ' / ' + slides.length;
}

prevBtn.addEventListener('click', function() { show(current - 1); });
nextBtn.addEventListener('click', function() { show(current + 1); });
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function captureSlide(slideEl) {
    return html2canvas(slideEl.querySelector('.poster'), {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1080,
        height: 1350,
        windowWidth: 1080,
        windowHeight: 1350
    });
}

function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

dlBtn.addEventListener('click', function() {
    dlBtn.disabled = true;
    var label = dlBtn.textContent;
    dlBtn.textContent = 'Generando…';
    var team = TEAMS[current];
    var slide = slides[current];
    slide.classList.add('active');
    captureSlide(slide).then(function(canvas) {
        canvas.toBlob(function(blob) {
            triggerDownload(blob, 'cartel-' + team.id + '.png');
            dlBtn.disabled = false;
            dlBtn.textContent = label;
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('Error al generar la imagen.');
        dlBtn.disabled = false;
        dlBtn.textContent = label;
    });
});

dlAllBtn.addEventListener('click', async function() {
    dlAllBtn.disabled = true;
    var origLabel = dlAllBtn.textContent;
    for (var i = 0; i < slides.length; i++) {
        dlAllBtn.textContent = 'Generando ' + (i + 1) + ' / ' + slides.length + '…';
        slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
        await new Promise(function(r) { setTimeout(r, 120); });
        try {
            var canvas = await captureSlide(slides[i]);
            var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
            triggerDownload(blob, 'cartel-' + TEAMS[i].id + '.png');
            await new Promise(function(r) { setTimeout(r, 200); });
        } catch (e) {
            console.error(e);
        }
    }
    show(current);
    dlAllBtn.disabled = false;
    dlAllBtn.textContent = origLabel;
});
</script>
</body>
</html>
