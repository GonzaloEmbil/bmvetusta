<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carteles equipos · III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700;800;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #0c0c14;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    /* ── Controls ──────────────────────────────────────── */
    .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
    }

    /* Side nav buttons (prev/next) */
    .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(31,31,46,0.9);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 26px;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.2s;
        z-index: 20;
        backdrop-filter: blur(8px);
    }
    .nav-arrow:hover {
        background: #FDED3A;
        color: #0a0a1a;
    }
    .nav-arrow.prev { left: -28px; }
    .nav-arrow.next { right: -28px; }
    @media (max-width: 720px) {
        .nav-arrow { width: 44px; height: 44px; font-size: 20px; }
        .nav-arrow.prev { left: -10px; }
        .nav-arrow.next { right: -10px; }
    }

    .stage-outer {
        position: relative;
        display: inline-block;
    }

    /* Download buttons fixed bottom-right */
    .download-cluster {
        position: fixed;
        bottom: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 30;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a1a;
        border: 0;
        padding: 14px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 6px 22px rgba(253,237,58,0.35);
        transition: transform 0.2s, box-shadow 0.2s;
        white-space: nowrap;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(253,237,58,0.5);
    }
    .download-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }

    .download-all-btn {
        background: rgba(31,31,46,0.92);
        color: #FDED3A;
        border: 1px solid #FDED3A;
        padding: 12px 22px;
        font-family: 'Inter', sans-serif;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s, color 0.2s;
        white-space: nowrap;
    }
    .download-all-btn:hover { background: #FDED3A; color: #0a0a1a; }
    .download-all-btn:disabled { opacity: 0.6; cursor: wait; }

    .slide-info {
        color: rgba(255,255,255,0.7);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
    }

    /* ── Stage ─────────────────────────────────────────── */
    :root {
        --scale: 1;
    }

    .stage-wrap {
        width: calc(1080px * var(--scale));
        height: calc(1350px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        border-radius: 8px;
        overflow: hidden;
    }

    .stage {
        width: 1080px;
        height: 1350px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .slides { position: relative; width: 100%; height: 100%; }

    .slide {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s;
    }
    .slide.active { opacity: 1; visibility: visible; }

    /* ── Poster ────────────────────────────────────────── */
    .poster {
        width: 100%;
        height: 100%;
        background:
            radial-gradient(ellipse at 50% 35%, rgba(253,237,58,0.06) 0%, transparent 55%),
            linear-gradient(180deg, #14141d 0%, #0a0a14 55%, #050509 100%);
        color: #fff;
        position: relative;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* Subtle inner frame — a 1px line of low-opacity yellow inset 40px.
       Use longhand top/right/bottom/left (not 'inset:') for html2canvas
       compatibility. */
    .poster::before {
        content: '';
        position: absolute;
        top: 40px;
        right: 40px;
        bottom: 40px;
        left: 40px;
        border: 1px solid rgba(253,237,58,0.10);
        pointer-events: none;
        z-index: 1;
    }

    /* ── Top bar ───────────────────────────────────────── */
    .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 78px 90px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 5;
    }

    .top-brand {
        display: flex;
        align-items: center;
        gap: 26px;
    }

    .top-logo {
        width: 96px;
        height: 96px;
        object-fit: contain;
    }

    .top-brand-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        line-height: 1;
    }

    .top-brand-eyebrow {
        font-family: 'Inter', sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #FDED3A;
        letter-spacing: 6px;
        text-transform: uppercase;
        line-height: 1;
    }

    .top-brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 50px;
        line-height: 1;
        letter-spacing: 2px;
        color: #fff;
    }

    /* ── Centerpiece elements ──────────────────────────────
       Each element is anchored to a fixed Y position so the
       shield, team name, flag and city always sit at the same
       height across every slide regardless of name length. */

    .shield-stage {
        position: absolute;
        top: 240px;
        left: 50%;
        transform: translateX(-50%);
        width: 520px;
        height: 520px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
    }

    /* Soft yellow halo behind the shield. Longhand top/right/bottom/left
       (instead of 'inset:') for html2canvas compatibility. */
    .shield-stage::before {
        content: '';
        position: absolute;
        top: -20%;
        right: -20%;
        bottom: -20%;
        left: -20%;
        background: radial-gradient(circle, rgba(253,237,58,0.16) 0%, transparent 65%);
        z-index: -1;
    }

    .shield-disc {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .shield-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    .team-name {
        position: absolute;
        top: 820px;
        left: 0;
        right: 0;
        text-align: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 124px;
        line-height: 0.88;
        letter-spacing: 2px;
        color: #fff;
        text-transform: uppercase;
        white-space: nowrap;
        z-index: 3;
    }
    /* Only kicks in for the longest names (Selección Asturiana, BM Cidade
       das Burgas) where the default 124px would overflow the poster width. */
    .team-name.size-fit { font-size: 100px; }

    .team-city {
        position: absolute;
        top: 980px;
        left: 50%;
        transform: translateX(-50%);
        display: inline-flex;
        align-items: center;
        gap: 18px;
        font-family: 'Inter', sans-serif;
        font-size: 30px;
        font-weight: 600;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.78);
        white-space: nowrap;
        z-index: 3;
    }

    .team-city svg {
        width: 30px;
        height: 30px;
        fill: #FDED3A;
        flex-shrink: 0;
    }

    /* ── Footer ────────────────────────────────────────── */
    .bottom {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 0 90px 76px;
        z-index: 3;
        text-align: center;
    }

    .categories {
        text-align: center;
        margin-bottom: 40px;
    }

    .category-pill {
        color: #FDED3A;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 30px;
        font-weight: 400;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 0;
        background: transparent;
        border: 0;
        border-radius: 0;
    }

    .category-sep {
        color: rgba(255,255,255,0.25);
        margin: 0 14px;
        font-weight: 400;
    }

    .bottom-meta {
        padding-top: 32px;
        border-top: 1px solid rgba(255,255,255,0.12);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 24px;
        line-height: 1;
    }

    .bottom-meta-dates,
    .bottom-meta-venue {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 30px;
        letter-spacing: 3px;
        color: #fff;
    }

    .bottom-meta-dates { text-align: left; }
    .bottom-meta-venue { text-align: right; }

    .bottom-meta-dates .sep,
    .bottom-meta-venue .sep {
        color: rgba(255,255,255,0.3);
        margin: 0 4px;
        font-weight: 400;
    }

    /* ── Flag styles ─────────────────────────────────── */
    .team-flag {
        width: 54px;
        height: 36px;
        object-fit: cover;
        border-radius: 2px;
        box-shadow: 0 0 0 1px rgba(255,255,255,0.22);
        flex-shrink: 0;
    }

    /* Per-team shield overrides */
    .slide[data-id="seleccion_asturiana"] .shield-img { transform: scale(0.88); }

    /* ── Overview slide (all teams) ────────────────────── */
    .poster.overview {
        background: radial-gradient(circle at 20% 0%, #1a1a2e 0%, #000 60%);
        display: flex;
        flex-direction: column;
    }

    .poster.overview::before {
        content: '';
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.18) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .poster.overview::after {
        content: '';
        position: absolute;
        bottom: -200px;
        left: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(253,237,58,0.10) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
    }

    .ov-header {
        text-align: center;
        padding: 65px 60px 35px;
        position: relative;
        z-index: 2;
    }

    .ov-logo {
        width: 130px;
        height: 130px;
        margin: 0 auto 22px;
        display: block;
        object-fit: contain;
    }

    .ov-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 130px;
        line-height: 0.95;
        letter-spacing: 4px;
        margin-bottom: 30px;
        color: #fff;
    }

    .ov-title-roman {
        color: #FDED3A;
        display: block;
        font-size: 110px;
        line-height: 1;
    }

    .ov-meta {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 16px 34px;
        border: 2px solid rgba(253,237,58,0.4);
        border-radius: 26px;
        text-transform: uppercase;
        margin-top: 8px;
    }

    .ov-meta-days {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        letter-spacing: 8px;
        color: #FDED3A;
        line-height: 1;
        display: flex;
        gap: 18px;
        align-items: center;
    }

    .ov-meta-days .sep {
        color: rgba(255,255,255,0.35);
        font-weight: 400;
        margin: 0 -6px;
    }

    .ov-meta-month {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 6px;
        color: #fff;
    }

    .ov-section-title {
        text-align: center;
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.55);
        letter-spacing: 6px;
        text-transform: uppercase;
        margin: 30px 0 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
        position: relative;
        z-index: 2;
    }

    .ov-section-title::before,
    .ov-section-title::after {
        content: '';
        height: 1px;
        flex: 0 0 80px;
        background: linear-gradient(90deg, transparent, rgba(253,237,58,0.5));
    }

    .ov-section-title::after {
        background: linear-gradient(90deg, rgba(253,237,58,0.5), transparent);
    }

    .ov-teams {
        flex: 1;
        padding: 0 70px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 35px 30px;
        align-content: center;
        position: relative;
        z-index: 2;
    }

    .ov-team {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }

    .ov-team-shield {
        width: 150px;
        height: 150px;
        object-fit: contain;
        background: rgba(255,255,255,0.06);
        border-radius: 18px;
        padding: 14px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    /* Vetusta and Selección Asturiana stay at the previous 130px size */
    .ov-team[data-id="bm_vetusta"] .ov-team-shield,
    .ov-team[data-id="seleccion_asturiana"] .ov-team-shield {
        width: 130px;
        height: 130px;
    }

    .ov-team-name {
        font-size: 14px;
        font-weight: 700;
        text-align: center;
        line-height: 1.25;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #fff;
        max-width: 160px;
    }

    .ov-footer {
        padding: 30px 60px 50px;
        text-align: center;
        position: relative;
        z-index: 2;
    }

    .ov-footer-categories {
        display: inline-flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 22px;
    }

    .ov-category-pill {
        background: rgba(253,237,58,0.12);
        color: #FDED3A;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 1px;
        padding: 8px 18px;
        border-radius: 999px;
        text-transform: uppercase;
    }

    .ov-footer-venue {
        font-size: 16px;
        color: rgba(255,255,255,0.7);
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
    }

    .ov-footer-venue strong { color: #fff; }
</style>
</head>
<body>
<div class="page">
    <div class="stage-outer">
        <button id="prev-btn" class="nav-arrow prev" type="button" aria-label="Anterior">‹</button>
        <button id="next-btn" class="nav-arrow next" type="button" aria-label="Siguiente">›</button>
        <div class="stage-wrap">
            <div class="stage">
                <div class="slides" id="slides"></div>
            </div>
        </div>
    </div>
</div>

<div class="download-cluster">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar este</button>
    <button id="download-all-btn" class="download-all-btn" type="button">⬇ Descargar todos</button>
</div>

<script>
// Order: more categories first; for ties, Asturian teams go last
// Set 'blend: true' for shields with white/light backgrounds we want to flatten
var TEAMS = [
    { id: 'egia_eskubaloia',      name: 'Egia Eskubaloia',      city: 'Guipúzcoa', flag: '../src/assets/banderas/pais_vasco.svg',      shield: '../src/assets/escudo_egia_eskubaloia.png',     cats: ['Cadete Femenino','Cadete Masculino','Infantil Masculino'] },
    { id: 'bm_chinchon',          name: 'BM Chinchón',          city: 'Madrid',    flag: '../src/assets/banderas/madrid.svg',          shield: '../src/assets/escudo_bm_chinchon.png',         cats: ['Cadete Masculino','Infantil Masculino'] },
    { id: 'seleccion_asturiana',  name: 'Selección Asturiana',  city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_seleccion_asturiana.png', cats: ['Cadete Femenino','Cadete Masculino'] },
    { id: 'cd_balopal',           name: 'CD Balopal',           city: 'Palencia',  flag: '../src/assets/banderas/castilla_y_leon.svg', shield: '../src/assets/escudo_cd_balopal_v2.png',       cats: ['Infantil Masculino'] },
    { id: 'bm_cidade_das_burgas', name: 'BM Cidade das Burgas', city: 'Ourense',   flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_cidade_das_burgas.png',cats: ['Infantil Masculino'] },
    { id: 'bm_xallas',            name: 'BM Xallas',            city: 'A Coruña',  flag: '../src/assets/banderas/galicia.svg',         shield: '../src/assets/escudo_bm_xallas.png',           cats: ['Cadete Femenino'] },
    { id: 'deportivo_estadio',    name: 'Deportivo Estadio',    city: 'Asturias',  flag: '../src/assets/banderas/asturias.svg',        shield: '../src/assets/escudo_estadio_sinfondo.png',    cats: ['Cadete Masculino'] }
];

function pinSvg() {
    return '<svg viewBox="0 0 24 24"><path d="M12 0C7.58 0 4 3.58 4 8c0 5.5 8 16 8 16s8-10.5 8-16c0-4.42-3.58-8-8-8zm0 11a3 3 0 110-6 3 3 0 010 6z"/></svg>';
}

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function(c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
}

function nameSizeClass(name) {
    // Single uniform default size. Only the few names that would overflow
    // a single line at the default size drop to .size-fit. Threshold (18+
    // characters of full string) catches 'Selección Asturiana' and
    // 'BM Cidade das Burgas'; every other team keeps the same default size.
    if ((name || '').length >= 18) return 'team-name size-fit';
    return 'team-name';
}

// Names that need a manual line-break to fit the overview grid cell (~160px wide)
var OV_NAME_BREAKS = {
    'BM Cidade das Burgas': 'BM Cidade<br>das Burgas',
    'Egia Eskubaloia':      'Egia<br>Eskubaloia',
    'Selección Asturiana':  'Selección<br>Asturiana',
    'Deportivo Estadio':    'Deportivo<br>Estadio'
};

function renderOverviewSlide() {
    var cats = ['Cadete Femenino','Cadete Masculino','Infantil Masculino']
        .map(function(c) { return '<span class="ov-category-pill">' + c + '</span>'; })
        .join('');
    var teamItems = TEAMS.map(function(t) {
        var nameHtml = OV_NAME_BREAKS[t.name] || escapeHtml(t.name);
        return '<div class="ov-team" data-id="' + t.id + '">' +
            '<img src="' + t.shield + '" class="ov-team-shield" alt="">' +
            '<div class="ov-team-name">' + nameHtml + '</div>' +
        '</div>';
    }).join('');
    return '<div class="slide active" data-id="overview">' +
        '<div class="poster overview">' +
            '<div class="ov-header">' +
                '<img src="../src/assets/escudo.png" class="ov-logo" alt="">' +
                '<h1 class="ov-title">' +
                    '<span class="ov-title-roman">III TORNEO</span>' +
                    'BM VETUSTA' +
                '</h1>' +
                '<div class="ov-meta">' +
                    '<div class="ov-meta-days">' +
                        '<span>19</span><span class="sep">·</span><span>20</span><span class="sep">·</span><span>21</span>' +
                    '</div>' +
                    '<div class="ov-meta-month">Junio 2026</div>' +
                '</div>' +
            '</div>' +
            '<div class="ov-section-title">Equipos participantes</div>' +
            '<div class="ov-teams">' + teamItems + '</div>' +
            '<div class="ov-footer">' +
                '<div class="ov-footer-categories">' + cats + '</div>' +
                '<div class="ov-footer-venue">Florida Arena <strong>·</strong> Pabellón Vallobín <strong>·</strong> Oviedo</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

function renderSlide(team, index) {
    var cats = team.cats.map(function(c) {
        return '<span class="category-pill">' + escapeHtml(c) + '</span>';
    }).join('<span class="category-sep">·</span>');
    return '<div class="slide' + (index === 0 ? ' active' : '') + '" data-id="' + team.id + '">' +
        '<div class="poster">' +
            '<div class="top-bar">' +
                '<div class="top-brand">' +
                    '<img src="../src/assets/escudo.png" class="top-logo" alt="">' +
                    '<div class="top-brand-text">' +
                        '<div class="top-brand-eyebrow">III Torneo Nacional</div>' +
                        '<div class="top-brand-title">Balonmano Vetusta</div>' +
                    '</div>' +
                '</div>' +
            '</div>' +

            '<div class="shield-stage">' +
                '<div class="shield-disc">' +
                    '<img src="' + team.shield + '" class="shield-img" alt="">' +
                '</div>' +
            '</div>' +
            '<div class="' + nameSizeClass(team.name) + '">' + escapeHtml(team.name) + '</div>' +
            '<div class="team-city">' +
                (team.flag ? '<img src="' + team.flag + '" class="team-flag" alt="">' : pinSvg()) +
                escapeHtml(team.city) +
            '</div>' +

            '<div class="bottom">' +
                '<div class="categories">' + cats + '</div>' +
                '<div class="bottom-meta">' +
                    '<div class="bottom-meta-dates">' +
                        '19<span class="sep">·</span>20<span class="sep">·</span>21 Junio' +
                    '</div>' +
                    '<div class="bottom-meta-venue">Florida Arena<span class="sep">·</span>Vallobín</div>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
}

var slidesEl = document.getElementById('slides');
slidesEl.innerHTML = TEAMS.map(renderSlide).join('');
var slides = slidesEl.querySelectorAll('.slide');
var current = 0;

// Filename for each slide's downloaded PNG
function slideFilename(i) {
    return 'cartel-' + TEAMS[i].id + '.png';
}

// Responsive scale: fit 1080x1350 cartel into viewport
// Leave room for the side arrows and slide-info caption
function updateScale() {
    var availW = window.innerWidth - 140;  // 56px arrows + safety margin both sides
    var availH = window.innerHeight - 100; // info caption + padding
    var scale = Math.min(availW / 1080, availH / 1350, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var prevBtn = document.getElementById('prev-btn');
var nextBtn = document.getElementById('next-btn');
var dlBtn = document.getElementById('download-btn');
var dlAllBtn = document.getElementById('download-all-btn');

function show(i) {
    current = ((i % slides.length) + slides.length) % slides.length;
    slides.forEach(function(s, idx) { s.classList.toggle('active', idx === current); });
}

prevBtn.addEventListener('click', function() { show(current - 1); });
nextBtn.addEventListener('click', function() { show(current + 1); });
document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') show(current - 1);
    if (e.key === 'ArrowRight') show(current + 1);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function captureSlide(slideEl) {
    // Clone the .poster out into an off-screen 1080x1350 container so
    // html2canvas captures the natural pixel grid. Capturing in place
    // inherits the parent .stage's transform:scale(var(--scale)),
    // which breaks the export geometry on every team poster.
    var src = slideEl.querySelector('.poster');
    var holder = document.createElement('div');
    holder.style.cssText = 'position:fixed;left:-99999px;top:0;width:1080px;height:1350px;pointer-events:none;';
    var clone = src.cloneNode(true);
    clone.style.width = '1080px';
    clone.style.height = '1350px';
    clone.style.transform = 'none';
    holder.appendChild(clone);
    document.body.appendChild(holder);

    function cleanup() { try { document.body.removeChild(holder); } catch (e) {} }

    return html2canvas(clone, {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1080,
        height: 1350,
        windowWidth: 1080,
        windowHeight: 1350
    }).then(function(canvas) {
        cleanup();
        return canvas;
    }, function(err) {
        cleanup();
        throw err;
    });
}

function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

dlBtn.addEventListener('click', function() {
    dlBtn.disabled = true;
    var label = dlBtn.textContent;
    dlBtn.textContent = 'Generando…';
    var slide = slides[current];
    slide.classList.add('active');
    captureSlide(slide).then(function(canvas) {
        canvas.toBlob(function(blob) {
            triggerDownload(blob, slideFilename(current));
            dlBtn.disabled = false;
            dlBtn.textContent = label;
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('Error al generar la imagen.');
        dlBtn.disabled = false;
        dlBtn.textContent = label;
    });
});

dlAllBtn.addEventListener('click', async function() {
    dlAllBtn.disabled = true;
    var origLabel = dlAllBtn.textContent;
    for (var i = 0; i < slides.length; i++) {
        dlAllBtn.textContent = 'Generando ' + (i + 1) + ' / ' + slides.length + '…';
        slides.forEach(function(s, idx) { s.classList.toggle('active', idx === i); });
        await new Promise(function(r) { setTimeout(r, 120); });
        try {
            var canvas = await captureSlide(slides[i]);
            var blob = await new Promise(function(r) { canvas.toBlob(r, 'image/png'); });
            triggerDownload(blob, slideFilename(i));
            await new Promise(function(r) { setTimeout(r, 200); });
        } catch (e) {
            console.error(e);
        }
    }
    show(current);
    dlAllBtn.disabled = false;
    dlAllBtn.textContent = origLabel;
});
</script>
</body>
</html>
