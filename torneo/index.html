    <script>
    (function() {
        var SHEET_ID = '1EWPyjbzwOJqDvWilhbNTG6Kh_ohS3cdaLB3vtoxW200';
        var API_KEY = 'AIzaSyBy7sfxGNc1YgFB2Jh_m12uqw2hgiW-l-g';
        var CATEGORIES = ['Cadete Femenino', 'Cadete Masculino', 'Infantil Masculino'];
        var DEFAULT_SHIELD = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23555"><circle cx="12" cy="12" r="10"/><path fill="%23222" d="M12 6l1.5 4h4l-3.2 2.4 1.2 4-3.5-2.5-3.5 2.5 1.2-4L6.5 10h4z"/></svg>');

        var dataByCategory = {};

        function teamSlug(name) {
            return (name || '').toLowerCase()
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .replace(/[^a-z0-9]+/g, '_')
                .replace(/^_+|_+$/g, '');
        }

        function shieldPath(name) {
            return '../src/assets/escudo_' + teamSlug(name) + '.png';
        }

        function escapeHtml(str) {
            return (str || '').replace(/[&<>"']/g, function(c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        // Convert sheet rows (array of arrays) to objects
        function parseRows(values) {
            if (!values || values.length < 2) return [];
            var headers = values[0].map(function(h) { return (h || '').trim(); });
            return values.slice(1).map(function(row) {
                var obj = {};
                headers.forEach(function(h, i) { obj[h] = (row[i] || '').trim(); });
                return obj;
            }).filter(function(m) { return m.Local && m.Visitante; });
        }

        function computeStandings(matches) {
            var teams = {};
            matches.forEach(function(m) {
                if (!teams[m.Local]) teams[m.Local] = { nombre: m.Local, PJ: 0, PG: 0, PE: 0, PP: 0, GF: 0, GC: 0 };
                if (!teams[m.Visitante]) teams[m.Visitante] = { nombre: m.Visitante, PJ: 0, PG: 0, PE: 0, PP: 0, GF: 0, GC: 0 };
                var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                if (isNaN(gl) || isNaN(gv)) return;
                var l = teams[m.Local], v = teams[m.Visitante];
                l.PJ++; v.PJ++;
                l.GF += gl; l.GC += gv;
                v.GF += gv; v.GC += gl;
                if (gl > gv) { l.PG++; v.PP++; }
                else if (gl < gv) { v.PG++; l.PP++; }
                else { l.PE++; v.PE++; }
            });
            return Object.values(teams).map(function(t) {
                t.DIF = t.GF - t.GC;
                t.PTS = t.PG * 2 + t.PE;
                return t;
            }).sort(function(a, b) {
                return b.PTS - a.PTS || b.DIF - a.DIF || b.GF - a.GF;
            });
        }

        function renderStandings(standings) {
            if (!standings.length) return '';
            var rows = standings.map(function(t, i) {
                var difClass = t.DIF > 0 ? 'st-dif-pos' : t.DIF < 0 ? 'st-dif-neg' : 'st-dif-zero';
                var difText = (t.DIF > 0 ? '+' : '') + t.DIF;
                return '<tr>' +
                    '<td class="st-pos">' + (i + 1) + '</td>' +
                    '<td class="st-team-cell">' +
                        '<img src="' + shieldPath(t.nombre) + '" onerror="this.src=\'' + DEFAULT_SHIELD + '\'" class="st-team-badge" alt="">' +
                        '<span class="st-team-name">' + escapeHtml(t.nombre) + '</span>' +
                    '</td>' +
                    '<td>' + t.PJ + '</td>' +
                    '<td>' + t.PG + '</td>' +
                    '<td>' + t.PE + '</td>' +
                    '<td>' + t.PP + '</td>' +
                    '<td class="st-hide-mobile">' + t.GF + '</td>' +
                    '<td class="st-hide-mobile">' + t.GC + '</td>' +
                    '<td class="' + difClass + '">' + difText + '</td>' +
                    '<td><strong>' + t.PTS + '</strong></td>' +
                '</tr>';
            }).join('');

            return '<div class="standings-table-wrapper">' +
                '<table class="standings-table">' +
                    '<thead><tr>' +
                        '<th class="st-pos">#</th>' +
                        '<th class="st-team">Equipo</th>' +
                        '<th>PJ</th><th>PG</th><th>PE</th><th>PP</th>' +
                        '<th class="st-hide-mobile">GF</th><th class="st-hide-mobile">GC</th>' +
                        '<th>DIF</th><th>PTS</th>' +
                    '</tr></thead>' +
                    '<tbody>' + rows + '</tbody>' +
                '</table>' +
            '</div>';
        }

        function renderMatches(matches) {
            if (!matches.length) {
                return '<p class="torneo-empty">No hay partidos disponibles.</p>';
            }
            // Group by date
            var byDate = {};
            matches.forEach(function(m) {
                var d = m.Fecha || 'Sin fecha';
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(m);
            });
            var dates = Object.keys(byDate).sort(function(a, b) {
                // Sort by parsing dd/mm/yy or dd/mm/yyyy
                function toTs(s) {
                    var p = s.split('/');
                    if (p.length !== 3) return 0;
                    var y = p[2].length === 2 ? '20' + p[2] : p[2];
                    return new Date(y + '-' + p[1].padStart(2, '0') + '-' + p[0].padStart(2, '0')).getTime() || 0;
                }
                return toTs(a) - toTs(b);
            });

            return dates.map(function(d) {
                // Sort matches within a date by hour
                byDate[d].sort(function(a, b) { return (a.Hora || '').localeCompare(b.Hora || ''); });
                var cards = byDate[d].map(function(m) {
                    var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                    var played = !isNaN(gl) && !isNaN(gv);
                    var scoreHtml = played
                        ? '<div class="torneo-match-score"><span>' + gl + '</span><span class="torneo-match-sep">-</span><span>' + gv + '</span></div>'
                        : '<div class="torneo-match-vs">vs</div>';
                    var venueLine = m.Lugar || '';
                    return '<div class="torneo-match">' +
                        '<div class="torneo-match-meta">' +
                            (m.Hora ? '<span class="torneo-match-date">' + escapeHtml(m.Hora) + '</span>' : '') +
                            (venueLine ? '<span class="torneo-match-venue">' + escapeHtml(venueLine) + '</span>' : '') +
                        '</div>' +
                        '<div class="torneo-match-teams">' +
                            '<div class="torneo-match-team torneo-match-team-local">' +
                                '<span class="torneo-match-name">' + escapeHtml(m.Local) + '</span>' +
                                '<img src="' + shieldPath(m.Local) + '" onerror="this.src=\'' + DEFAULT_SHIELD + '\'" alt="" class="torneo-match-shield">' +
                            '</div>' +
                            scoreHtml +
                            '<div class="torneo-match-team torneo-match-team-away">' +
                                '<img src="' + shieldPath(m.Visitante) + '" onerror="this.src=\'' + DEFAULT_SHIELD + '\'" alt="" class="torneo-match-shield">' +
                                '<span class="torneo-match-name">' + escapeHtml(m.Visitante) + '</span>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');

                return '<div class="torneo-jornada-block">' +
                    '<h3 class="torneo-jornada-title">' + escapeHtml(d) + '</h3>' +
                    '<div class="torneo-matches">' + cards + '</div>' +
                '</div>';
            }).join('');
        }

        function renderCategory(category) {
            var matches = dataByCategory[category] || [];
            var standings = computeStandings(matches);
            var content = document.getElementById('torneo-content');
            content.innerHTML =
                '<h2 class="historia-subtitle">Clasificación</h2>' +
                renderStandings(standings) +
                '<h2 class="historia-subtitle">Partidos</h2>' +
                renderMatches(matches);
        }

        function setupTabs() {
            var tabs = document.querySelectorAll('.torneo-tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    renderCategory(tab.getAttribute('data-cat'));
                });
            });
        }

        function loadData() {
            var ranges = CATEGORIES.map(function(c) {
                return 'ranges=' + encodeURIComponent("'" + c + "'!A:H");
            }).join('&');
            var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values:batchGet?' + ranges + '&key=' + API_KEY;

            return fetch(url)
                .then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function(data) {
                    (data.valueRanges || []).forEach(function(vr, i) {
                        dataByCategory[CATEGORIES[i]] = parseRows(vr.values);
                    });
                });
        }

        function init() {
            setupTabs();
            loadData()
                .then(function() {
                    renderCategory(CATEGORIES[0]);
                })
                .catch(function(err) {
                    document.getElementById('torneo-content').innerHTML =
                        '<p class="torneo-empty">No se pudieron cargar los datos. Inténtalo de nuevo más tarde.</p>';
                    console.error('Failed to load tournament data:', err);
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
