<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>III Torneo BM Vetusta</title>
    <link rel="icon" type="image/png" href="../src/assets/escudo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #ffffff;
            color: #0f172a;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Hero ─────────────────────────────────────────── */
        .hero {
            background: #000;
            color: #fff;
            padding: 22px 24px 28px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(253, 237, 58, 0.18) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(40%, -50%);
            pointer-events: none;
        }

        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .hero-logo {
            width: 52px;
            height: 52px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .hero-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hero-text { min-width: 0; }

        .hero-eyebrow {
            color: #FDED3A;
            font-size: 0.66rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hero-title {
            font-family: 'Bebas Neue', 'Inter', sans-serif;
            font-size: clamp(1.5rem, 3.5vw, 2.1rem);
            font-weight: 400;
            margin: 0 0 2px;
            line-height: 1;
            letter-spacing: 1px;
        }

        .hero-subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.78rem;
            font-weight: 500;
            margin: 0;
        }

        .hero-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 500;
            margin-bottom: 14px;
            transition: color 0.2s;
        }

        .hero-back:hover { color: #FDED3A; }

        /* ── Tabs ─────────────────────────────────────────── */
        .tabs-wrap {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        }

        .tabs {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            background: transparent;
            border: 0;
            padding: 18px 22px;
            font-size: 0.86rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 3px solid transparent;
            transition: color 0.2s, border-color 0.2s;
            font-family: inherit;
        }

        .tab:hover { color: #0f172a; }

        .tab.active {
            color: #0f172a;
            border-bottom-color: #FDED3A;
        }

        /* ── Main ─────────────────────────────────────────── */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Toggle ─────────────────────────────────────── */
        .toggle-wrap { margin-bottom: 28px; }

        .toggle {
            display: inline-flex;
            background: #f1f5f9;
            border-radius: 999px;
            padding: 4px;
            gap: 2px;
        }

        .toggle-btn {
            background: transparent;
            border: 0;
            padding: 9px 22px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            border-radius: 999px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .toggle-btn:hover { color: #0f172a; }

        .toggle-btn.active {
            background: #0f172a;
            color: #fff;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.2);
        }

        /* ── Standings ───────────────────────────────────── */
        .standings {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 50px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
        }

        .standings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        .standings-table thead th {
            background: #f8fafc;
            color: #64748b;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 10px;
            text-align: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .standings-table th:nth-child(1),
        .standings-table th:nth-child(2) { text-align: left; }

        .standings-table td {
            padding: 14px 10px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 500;
            color: #334155;
        }

        .standings-table tbody tr:last-child td { border-bottom: none; }
        .standings-table tbody tr:hover { background: #fafbfc; }

        .pos {
            font-weight: 800;
            color: #0f172a;
            width: 38px;
        }

        .pos-medal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            font-size: 0.78rem;
            color: #fff;
        }
        .pos-1 { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .pos-2 { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .pos-3 { background: linear-gradient(135deg, #d4a276, #92400e); }

        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left !important;
            min-width: 0;
            font-weight: 600;
            color: #0f172a;
        }

        .team-cell img {
            width: 32px;
            height: 32px;
            object-fit: contain;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 3px;
            flex-shrink: 0;
        }

        .team-cell span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .pts {
            font-weight: 800;
            color: #0f172a;
            font-size: 0.95rem;
        }

        .dif-pos { color: #16a34a; font-weight: 600; }
        .dif-neg { color: #dc2626; font-weight: 600; }
        .dif-zero { color: #94a3b8; font-weight: 600; }

        /* Vetusta row highlight removed by request */

        /* ── Matches ─────────────────────────────────────── */
        .day-block { margin-bottom: 36px; }

        .day-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.92rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0 0 14px;
        }

        .day-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #0f172a;
            color: #fff;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 14px;
        }

        .match {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 18px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }

        .match:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
            border-color: #cbd5e1;
        }

        .match.is-played { border-color: #f1f5f9; background: #fafbfc; }

        .match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #e5e7eb;
            gap: 10px;
        }

        .match-time {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #0f172a;
            font-weight: 700;
        }

        .match-venue {
            text-align: right;
            color: #64748b;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .match-teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 14px;
        }

        .match-team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .match-shield {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 10px;
            padding: 5px;
        }

        .match-team-name {
            font-size: 0.78rem;
            font-weight: 600;
            color: #0f172a;
            text-align: center;
            line-height: 1.25;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .match-score {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            color: #0f172a;
            min-width: 80px;
            line-height: 1;
        }

        .match-score-sep {
            color: #cbd5e1;
            font-weight: 400;
        }

        .match-score-loser { color: #94a3b8; }

        .match-vs {
            min-width: 80px;
            text-align: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #94a3b8;
            letter-spacing: 1.5px;
        }

        .match-pending-badge {
            display: inline-block;
            background: #f1f5f9;
            color: #64748b;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ── Group title ─────────────────────────────────── */
        .group-title {
            font-size: 0.78rem;
            font-weight: 800;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 36px 0 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-title:first-of-type { margin-top: 0; }

        .group-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: #FDED3A;
            border-radius: 2px;
        }

        /* ── Bracket ─────────────────────────────────────── */
        .bracket {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px 40px;
            margin-bottom: 30px;
        }

        .bracket-stage {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .bracket-stage-final {
            justify-content: center;
        }

        .bracket-stage-third {
            grid-column: 1 / -1;
            max-width: 420px;
            margin: 14px auto 0;
        }

        .bracket-stage-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .bracket-match {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 14px;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.04);
        }

        .bracket-match.is-played { background: #fafbfc; }

        .bracket-match-team {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 0;
        }

        .bracket-match-team:first-child {
            border-bottom: 1px solid #f1f5f9;
        }

        .bracket-shield {
            width: 28px;
            height: 28px;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 6px;
            padding: 3px;
            flex-shrink: 0;
        }

        .bracket-team-name {
            flex: 1;
            font-size: 0.84rem;
            font-weight: 600;
            color: #0f172a;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bracket-score {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            color: #0f172a;
            min-width: 28px;
            text-align: right;
            line-height: 1;
        }

        .bracket-match-team.is-loser .bracket-team-name,
        .bracket-match-team.is-loser .bracket-score {
            color: #94a3b8;
        }

        .bracket-match-meta {
            font-size: 0.68rem;
            color: #94a3b8;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #e5e7eb;
            text-align: center;
            font-weight: 500;
        }

        /* ── Match badge ─────────────────────────────────── */
        .match-badge-wrap {
            text-align: center;
            margin-bottom: 10px;
        }

        .match-badge {
            display: inline-block;
            background: #FDED3A;
            color: #0f172a;
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            padding: 3px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* ── Venue link ──────────────────────────────────── */
        .venue-link {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px dashed currentColor;
            transition: color 0.2s;
        }

        .venue-link:hover { color: #0f172a; }

        /* ── States ─────────────────────────────────────── */
        .loading, .empty, .error-msg {
            text-align: center;
            padding: 80px 20px;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top-color: #FDED3A;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 18px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Mobile ──────────────────────────────────────── */
        @media (max-width: 720px) {
            .hero { padding: 16px 18px 22px; }
            .hero-inner { gap: 14px; }
            .hero-logo { width: 44px; height: 44px; padding: 4px; }
            .hero-back { margin-bottom: 10px; }

            .tabs { padding: 0 12px; }
            .tab { padding: 14px 16px; font-size: 0.78rem; }

            .toggle-wrap { text-align: center; }

            main { padding: 28px 16px 60px; }

            .standings-table { font-size: 0.78rem; }
            .standings-table thead th,
            .standings-table td { padding: 10px 6px; }
            .standings-table .hide-mobile { display: none; }

            .team-cell { gap: 8px; }
            .team-cell img { width: 24px; height: 24px; }

            .matches-grid { grid-template-columns: 1fr; gap: 10px; }
            .match { padding: 14px; }
            .match-shield { width: 42px; height: 42px; }
            .match-score { font-size: 1.6rem; }

            .bracket { grid-template-columns: 1fr; gap: 20px; }
            .bracket-stage-third { max-width: 100%; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-inner-wrap" style="max-width:1100px;margin:0 auto;padding:0 0 0 0;">
            <a href="../" class="hero-back">← Volver a balonmanovetusta.com</a>
            <div class="hero-inner">
                <div class="hero-logo">
                    <img src="../src/assets/escudo.png" alt="Escudo BM Vetusta">
                </div>
                <div class="hero-text">
                    <h1 class="hero-title">III Torneo BM Vetusta</h1>
                </div>
            </div>
        </div>
    </header>

    <nav class="tabs-wrap">
        <div class="tabs" id="tabs">
            <button class="tab active" data-cat="Infantil Masculino">Infantil Masculino</button>
            <button class="tab" data-cat="Cadete Femenino">Cadete Femenino</button>
            <button class="tab" data-cat="Cadete Masculino">Cadete Masculino</button>
        </div>
    </nav>

    <main id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Cargando datos…</div>
        </div>
    </main>

    <script>
    (function() {
        var SHEET_ID = '1EWPyjbzwOJqDvWilhbNTG6Kh_ohS3cdaLB3vtoxW200';
        var API_KEY = 'AIzaSyBy7sfxGNc1YgFB2Jh_m12uqw2hgiW-l-g';
        var CATEGORIES = ['Infantil Masculino', 'Cadete Femenino', 'Cadete Masculino'];
        var DEFAULT_SHIELD = 'data:image/svg+xml,' + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="%23e2e8f0"/><path d="M12 7l1.5 4h4l-3.2 2.4 1.2 4-3.5-2.5-3.5 2.5 1.2-4L6.5 11h4z" fill="%2394a3b8"/></svg>'
        );

        var dataByCategory = {};

        function teamSlug(name) {
            return (name || '').toLowerCase()
                .normalize('NFD').replace(/[̀-ͯ]/g, '')
                .replace(/[^a-z0-9]+/g, '_')
                .replace(/^_+|_+$/g, '');
        }

        function isVetusta(name) {
            var s = teamSlug(name);
            return s.indexOf('vetusta') !== -1;
        }

        var VENUE_LINKS = {
            'florida arena': 'https://maps.app.goo.gl/fFrPjWBikzeKfH8v9',
            'vallobin': 'https://maps.app.goo.gl/1fEHsB1exe9qwyodA',
        };

        function venueUrl(venue) {
            if (!venue) return '';
            var key = (venue || '').toLowerCase()
                .normalize('NFD').replace(/[̀-ͯ]/g, '');
            for (var k in VENUE_LINKS) {
                if (key.indexOf(k) !== -1) return VENUE_LINKS[k];
            }
            return '';
        }

        function venueHtml(venue, prefix) {
            if (!venue) return '';
            var url = venueUrl(venue);
            var text = (prefix || '') + escapeHtml(venue);
            if (url) {
                return '<a href="' + url + '" target="_blank" rel="noopener noreferrer" class="venue-link">' + text + '</a>';
            }
            return text;
        }

        function shieldHtml(name, className) {
            if (isVetusta(name)) {
                return '<img src="../src/assets/logo.png" class="' + className + '" alt="">';
            }
            var slug = teamSlug(name);
            // Also fall back to the same shield without trailing _a/_b/_c suffix
            // (e.g. "Team A" and "Team B" share the same shield as "Team")
            var baseSlug = slug.replace(/_[a-z]$/, '');
            var slugList = baseSlug !== slug ? slug + '|' + baseSlug : slug;
            return '<img src="../src/assets/escudo_' + slug + '.png" onerror="window.__torneoShieldFB(this, \'' + slugList + '\')" class="' + className + '" alt="">';
        }

        // Exposed globally so inline onerror can call it
        window.__torneoShieldFB = function(img, slugList, step) {
            step = step || 0;
            var slugs = slugList.split('|');
            var paths = [];
            slugs.forEach(function(s, i) {
                if (i === 0) {
                    // first slug's .png is the initial src that failed → skip
                    paths.push('../src/assets/escudo_' + s + '.jpg');
                    paths.push('../src/assets/escudo_' + s + '.jpeg');
                } else {
                    paths.push('../src/assets/escudo_' + s + '.png');
                    paths.push('../src/assets/escudo_' + s + '.jpg');
                    paths.push('../src/assets/escudo_' + s + '.jpeg');
                }
            });
            paths.push(DEFAULT_SHIELD);
            if (step >= paths.length) { img.onerror = null; return; }
            img.onerror = function() { window.__torneoShieldFB(img, slugList, step + 1); };
            img.src = paths[step];
        };

        function escapeHtml(str) {
            return (str || '').replace(/[&<>"']/g, function(c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        function parseRows(values) {
            if (!values || values.length < 2) return [];
            var headers = values[0].map(function(h) { return (h || '').trim(); });
            return values.slice(1).map(function(row) {
                var obj = {};
                headers.forEach(function(h, i) { obj[h] = (row[i] || '').trim(); });
                return obj;
            }).filter(function(m) { return m.Local && m.Visitante; });
        }

        // ── Tiebreaker helpers (Art. 152, RPC RFEBM Feb 2025) ─────────────
        function normaliseName(name) {
            return (name || '').trim().toUpperCase();
        }

        function groupByValue(arr, valueFn) {
            var groups = [];
            for (var i = 0; i < arr.length; i++) {
                var item = arr[i];
                var val = valueFn(item);
                if (groups.length === 0 || valueFn(groups[groups.length - 1][0]) !== val) {
                    groups.push([item]);
                } else {
                    groups[groups.length - 1].push(item);
                }
            }
            return groups;
        }

        function getH2HMatches(teamNorms, finishedMatches) {
            return finishedMatches.filter(function(m) {
                var l = normaliseName(m.Local), v = normaliseName(m.Visitante);
                return teamNorms.indexOf(l) !== -1 && teamNorms.indexOf(v) !== -1;
            });
        }

        function computeH2HStats(teamNorms, h2hMatches) {
            var stats = {};
            teamNorms.forEach(function(n) { stats[n] = { pts: 0, gf: 0, gc: 0, dif: 0 }; });
            h2hMatches.forEach(function(m) {
                var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                if (isNaN(gl) || isNaN(gv)) return;
                var l = normaliseName(m.Local), v = normaliseName(m.Visitante);
                if (!stats[l] || !stats[v]) return;
                stats[l].gf += gl; stats[l].gc += gv;
                stats[v].gf += gv; stats[v].gc += gl;
                if (gl > gv) stats[l].pts += 2;
                else if (gl < gv) stats[v].pts += 2;
                else { stats[l].pts += 1; stats[v].pts += 1; }
            });
            teamNorms.forEach(function(n) { stats[n].dif = stats[n].gf - stats[n].gc; });
            return stats;
        }

        function allPairsHaveMinMatches(teamNorms, h2hMatches, min) {
            for (var i = 0; i < teamNorms.length; i++) {
                for (var j = i + 1; j < teamNorms.length; j++) {
                    var count = 0;
                    for (var k = 0; k < h2hMatches.length; k++) {
                        var l = normaliseName(h2hMatches[k].Local);
                        var v = normaliseName(h2hMatches[k].Visitante);
                        if ((l === teamNorms[i] && v === teamNorms[j]) ||
                            (l === teamNorms[j] && v === teamNorms[i])) count++;
                    }
                    if (count < min) return false;
                }
            }
            return true;
        }

        function splitAndResolve(teams, valueFn, finishedMatches) {
            var sorted = teams.slice().sort(function(a, b) { return valueFn(b) - valueFn(a); });
            var groups = groupByValue(sorted, valueFn);
            if (groups.length <= 1) return null;
            var result = [];
            for (var i = 0; i < groups.length; i++) {
                result = result.concat(resolveTiedGroup(groups[i], finishedMatches));
            }
            return result;
        }

        // Art. 152 a): tie between 2 teams
        function resolveTwoTeamTie(a, b, finishedMatches) {
            var nA = normaliseName(a.nombre), nB = normaliseName(b.nombre);
            var h2h = getH2HMatches([nA, nB], finishedMatches);
            var hasH2H = h2h.length > 0;

            if (hasH2H) {
                var s = computeH2HStats([nA, nB], h2h);
                if (s[nA].dif !== s[nB].dif) return s[nA].dif > s[nB].dif ? [a, b] : [b, a];
            }
            if (a.DIF !== b.DIF) return a.DIF > b.DIF ? [a, b] : [b, a];
            if (a.GF !== b.GF) return a.GF > b.GF ? [a, b] : [b, a];

            if (hasH2H) {
                var s2 = computeH2HStats([nA, nB], h2h);
                var rA = s2[nA].gc > 0 ? s2[nA].gf / s2[nA].gc : s2[nA].gf;
                var rB = s2[nB].gc > 0 ? s2[nB].gf / s2[nB].gc : s2[nB].gf;
                if (Math.abs(rA - rB) > 1e-9) return rA > rB ? [a, b] : [b, a];
            }
            var orA = a.GC > 0 ? a.GF / a.GC : a.GF;
            var orB = b.GC > 0 ? b.GF / b.GC : b.GF;
            if (Math.abs(orA - orB) > 1e-9) return orA > orB ? [a, b] : [b, a];
            return [a, b];
        }

        // Art. 152 b): tie among 3+ teams
        function resolveMultiTeamTie(teams, finishedMatches) {
            var norms = teams.map(function(t) { return normaliseName(t.nombre); });
            var h2h = getH2HMatches(norms, finishedMatches);
            var canUseH2H = allPairsHaveMinMatches(norms, h2h, 1);
            function getN(t) { return normaliseName(t.nombre); }

            if (canUseH2H) {
                var s = computeH2HStats(norms, h2h);
                var r = splitAndResolve(teams, function(t) { return s[getN(t)].pts; }, finishedMatches);
                if (r) return r;
                r = splitAndResolve(teams, function(t) { return s[getN(t)].dif; }, finishedMatches);
                if (r) return r;
            }
            var r2 = splitAndResolve(teams, function(t) { return t.DIF; }, finishedMatches);
            if (r2) return r2;

            if (canUseH2H) {
                var s2 = computeH2HStats(norms, h2h);
                r2 = splitAndResolve(teams, function(t) { return s2[getN(t)].gf; }, finishedMatches);
                if (r2) return r2;
            }
            r2 = splitAndResolve(teams, function(t) { return t.GF; }, finishedMatches);
            if (r2) return r2;

            var ratio = function(t) {
                if (t.GC === 0) return t.GF > 0 ? 1e9 : 0;
                return Math.round((t.GF / t.GC) * 100000);
            };
            r2 = splitAndResolve(teams, ratio, finishedMatches);
            if (r2) return r2;

            return teams;
        }

        function resolveTiedGroup(tiedTeams, finishedMatches) {
            if (tiedTeams.length <= 1) return tiedTeams;
            if (tiedTeams.length === 2) {
                return resolveTwoTeamTie(tiedTeams[0], tiedTeams[1], finishedMatches);
            }
            return resolveMultiTeamTie(tiedTeams, finishedMatches);
        }

        function computeStandings(matches) {
            var teams = {};
            matches.forEach(function(m) {
                if (!teams[m.Local]) teams[m.Local] = { nombre: m.Local, PJ: 0, PG: 0, PE: 0, PP: 0, GF: 0, GC: 0 };
                if (!teams[m.Visitante]) teams[m.Visitante] = { nombre: m.Visitante, PJ: 0, PG: 0, PE: 0, PP: 0, GF: 0, GC: 0 };
                var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                if (isNaN(gl) || isNaN(gv)) return;
                var l = teams[m.Local], v = teams[m.Visitante];
                l.PJ++; v.PJ++;
                l.GF += gl; l.GC += gv;
                v.GF += gv; v.GC += gl;
                if (gl > gv) { l.PG++; v.PP++; }
                else if (gl < gv) { v.PG++; l.PP++; }
                else { l.PE++; v.PE++; }
            });

            var teamsArray = Object.keys(teams).map(function(k) {
                var t = teams[k];
                t.DIF = t.GF - t.GC;
                t.PTS = t.PG * 2 + t.PE;
                return t;
            });

            var finished = matches.filter(function(m) {
                var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                return !isNaN(gl) && !isNaN(gv);
            });

            // Sort by points first, then resolve tied groups using Art. 152
            teamsArray.sort(function(a, b) { return b.PTS - a.PTS; });
            var groups = groupByValue(teamsArray, function(t) { return t.PTS; });
            var sorted = [];
            for (var i = 0; i < groups.length; i++) {
                sorted = sorted.concat(groups[i].length === 1 ? groups[i] : resolveTiedGroup(groups[i], finished));
            }
            return sorted;
        }

        function posCellHtml(i) {
            var n = i + 1;
            if (n <= 3) {
                return '<span class="pos-medal pos-' + n + '">' + n + '</span>';
            }
            return n;
        }

        function renderStandings(standings) {
            if (!standings.length) return '';
            var rows = standings.map(function(t, i) {
                var difClass = t.DIF > 0 ? 'dif-pos' : t.DIF < 0 ? 'dif-neg' : 'dif-zero';
                var difText = (t.DIF > 0 ? '+' : '') + t.DIF;
                var rowClass = isVetusta(t.nombre) ? ' class="vetusta-row"' : '';
                return '<tr' + rowClass + '>' +
                    '<td class="pos">' + posCellHtml(i) + '</td>' +
                    '<td><div class="team-cell">' +
                        shieldHtml(t.nombre, '') +
                        '<span>' + escapeHtml(t.nombre) + '</span>' +
                    '</div></td>' +
                    '<td>' + t.PJ + '</td>' +
                    '<td>' + t.PG + '</td>' +
                    '<td>' + t.PE + '</td>' +
                    '<td>' + t.PP + '</td>' +
                    '<td class="hide-mobile">' + t.GF + '</td>' +
                    '<td class="hide-mobile">' + t.GC + '</td>' +
                    '<td class="' + difClass + '">' + difText + '</td>' +
                    '<td class="pts">' + t.PTS + '</td>' +
                '</tr>';
            }).join('');

            return '<div class="standings"><table class="standings-table">' +
                '<thead><tr>' +
                    '<th>#</th><th>Equipo</th>' +
                    '<th>PJ</th><th>PG</th><th>PE</th><th>PP</th>' +
                    '<th class="hide-mobile">GF</th><th class="hide-mobile">GC</th>' +
                    '<th>DIF</th><th>PTS</th>' +
                '</tr></thead>' +
                '<tbody>' + rows + '</tbody>' +
            '</table></div>';
        }

        function parseDate(s) {
            var p = (s || '').split('/');
            if (p.length !== 3) return 0;
            var y = p[2].length === 2 ? '20' + p[2] : p[2];
            return new Date(y + '-' + p[1].padStart(2, '0') + '-' + p[0].padStart(2, '0')).getTime() || 0;
        }

        function formatDateLabel(s) {
            var p = (s || '').split('/');
            if (p.length !== 3) return s;
            var y = p[2].length === 2 ? '20' + p[2] : p[2];
            var dt = new Date(y + '-' + p[1].padStart(2, '0') + '-' + p[0].padStart(2, '0'));
            if (isNaN(dt.getTime())) return s;
            var days = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            var months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            return days[dt.getDay()] + ' ' + dt.getDate() + ' de ' + months[dt.getMonth()];
        }

        function renderMatches(matches) {
            if (!matches.length) {
                return '<div class="empty">No hay partidos disponibles.</div>';
            }
            var byDate = {};
            matches.forEach(function(m) {
                var d = m.Fecha || 'Sin fecha';
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(m);
            });
            var dates = Object.keys(byDate).sort(function(a, b) { return parseDate(a) - parseDate(b); });

            return dates.map(function(d) {
                byDate[d].sort(function(a, b) {
                    function toMin(s) {
                        var p = (s || '').split(':');
                        if (p.length !== 2) return 0;
                        return parseInt(p[0], 10) * 60 + parseInt(p[1], 10);
                    }
                    return toMin(a.Hora) - toMin(b.Hora);
                });

                var cards = byDate[d].map(function(m) {
                    var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
                    var played = !isNaN(gl) && !isNaN(gv);
                    var localLoser = played && gl < gv;
                    var awayLoser = played && gv < gl;

                    var scoreHtml = played
                        ? '<div class="match-score">' +
                            '<span' + (localLoser ? ' class="match-score-loser"' : '') + '>' + gl + '</span>' +
                            '<span class="match-score-sep">·</span>' +
                            '<span' + (awayLoser ? ' class="match-score-loser"' : '') + '>' + gv + '</span>' +
                          '</div>'
                        : '<div class="match-vs">VS</div>';

                    var venueLine = m.Lugar || m['Pabellón'] || m.Pabellon || '';

                    var badgeHtml = m.Tipo
                        ? '<div class="match-badge-wrap"><span class="match-badge">' + escapeHtml(m.Tipo) + '</span></div>'
                        : '';

                    return '<div class="match' + (played ? ' is-played' : '') + '">' +
                        badgeHtml +
                        '<div class="match-meta">' +
                            '<span class="match-time">' + (m.Hora ? '🕒 ' + escapeHtml(m.Hora) : '') + '</span>' +
                            '<span class="match-venue">' + venueHtml(venueLine, '📍 ') + '</span>' +
                        '</div>' +
                        '<div class="match-teams">' +
                            '<div class="match-team">' +
                                shieldHtml(m.Local, 'match-shield') +
                                '<div class="match-team-name">' + escapeHtml(m.Local) + '</div>' +
                            '</div>' +
                            scoreHtml +
                            '<div class="match-team">' +
                                shieldHtml(m.Visitante, 'match-shield') +
                                '<div class="match-team-name">' + escapeHtml(m.Visitante) + '</div>' +
                            '</div>' +
                        '</div>' +
                    '</div>';
                }).join('');

                return '<div class="day-block">' +
                    '<div class="day-title"><span class="day-pill">' + escapeHtml(formatDateLabel(d)) + '</span></div>' +
                    '<div class="matches-grid">' + cards + '</div>' +
                '</div>';
            }).join('');
        }

        function getGroupTypes(matches) {
            var seen = {};
            matches.forEach(function(m) {
                var t = (m.Tipo || '').toUpperCase().trim();
                if (/^GRUPO\s+/.test(t)) seen[t] = true;
            });
            return Object.keys(seen).sort();
        }

        function classifyMatchType(tipo) {
            var t = (tipo || '').toLowerCase();
            if (/^semifinal/.test(t)) return 'semifinal';
            if (/^final/.test(t) || /1.*y.*2|1.*2.*puesto/.test(t)) return 'final';
            if (/3.*y.*4|3.*4.*puesto/.test(t)) return 'third';
            if (/5.*y.*6|5.*6.*puesto/.test(t)) return 'fifth';
            if (/^grupo/.test(t)) return 'grupo';
            return 'other';
        }

        function renderBracketMatch(m) {
            var gl = parseInt(m.GolesLocal, 10), gv = parseInt(m.GolesVisitante, 10);
            var played = !isNaN(gl) && !isNaN(gv);
            var localLoser = played && gl < gv;
            var awayLoser = played && gv < gl;
            var venueLine = m.Lugar || '';

            return '<div class="bracket-match' + (played ? ' is-played' : '') + '">' +
                '<div class="bracket-match-team' + (localLoser ? ' is-loser' : '') + '">' +
                    shieldHtml(m.Local, 'bracket-shield') +
                    '<span class="bracket-team-name">' + escapeHtml(m.Local) + '</span>' +
                    '<span class="bracket-score">' + (played ? gl : '') + '</span>' +
                '</div>' +
                '<div class="bracket-match-team' + (awayLoser ? ' is-loser' : '') + '">' +
                    shieldHtml(m.Visitante, 'bracket-shield') +
                    '<span class="bracket-team-name">' + escapeHtml(m.Visitante) + '</span>' +
                    '<span class="bracket-score">' + (played ? gv : '') + '</span>' +
                '</div>' +
                ((m.Hora || venueLine) ? '<div class="bracket-match-meta">' +
                    (m.Hora ? '🕒 ' + escapeHtml(m.Hora) : '') +
                    (m.Hora && venueLine ? ' · ' : '') +
                    venueHtml(venueLine, '📍 ') +
                '</div>' : '') +
            '</div>';
        }

        function renderBracket(matches) {
            var sf = [], finalM = null, third = null;
            matches.forEach(function(m) {
                var type = classifyMatchType(m.Tipo);
                if (type === 'semifinal') sf.push(m);
                else if (type === 'final') finalM = m;
                else if (type === 'third') third = m;
            });
            if (!sf.length && !finalM && !third) return '';

            sf.sort(function(a, b) { return (a.Tipo || '').localeCompare(b.Tipo || ''); });

            var html = '<h2 class="group-title">Eliminatorias</h2>' +
                '<div class="bracket">';

            html += '<div class="bracket-stage bracket-stage-sf">' +
                '<div class="bracket-stage-label">Semifinales</div>';
            if (sf.length) {
                sf.forEach(function(m) { html += renderBracketMatch(m); });
            } else {
                html += '<div class="empty" style="padding:30px 12px;">Por definir</div>';
            }
            html += '</div>';

            html += '<div class="bracket-stage bracket-stage-final">' +
                '<div class="bracket-stage-label">Final</div>';
            if (finalM) html += renderBracketMatch(finalM);
            else html += '<div class="empty" style="padding:30px 12px;">Por definir</div>';
            html += '</div>';

            if (third) {
                html += '<div class="bracket-stage bracket-stage-third">' +
                    '<div class="bracket-stage-label">3º y 4º puesto</div>' +
                    renderBracketMatch(third) +
                '</div>';
            }

            html += '</div>';
            return html;
        }

        function renderClasificacion(matches) {
            var html = '';
            var groups = getGroupTypes(matches);

            if (groups.length > 1) {
                groups.forEach(function(grp) {
                    var groupMatches = matches.filter(function(m) {
                        return (m.Tipo || '').toUpperCase().trim() === grp;
                    });
                    var standings = computeStandings(groupMatches);
                    html += '<h2 class="group-title">' + escapeHtml(grp) + '</h2>';
                    html += standings.length
                        ? renderStandings(standings)
                        : '<div class="empty">Aún no hay clasificación.</div>';
                });
            } else {
                // Use only group matches if there's a single group, else all matches
                var matchesForStandings = groups.length === 1
                    ? matches.filter(function(m) { return classifyMatchType(m.Tipo) === 'grupo'; })
                    : matches.filter(function(m) {
                        var type = classifyMatchType(m.Tipo);
                        return type === 'grupo' || type === 'other';
                    });
                var standings = computeStandings(matchesForStandings);
                html += standings.length
                    ? renderStandings(standings)
                    : '<div class="empty">Aún no hay clasificación disponible.</div>';
            }

            html += renderBracket(matches);
            return html;
        }

        var currentCategory = CATEGORIES[0];
        var currentView = 'resultados';

        function renderCategory(category) {
            currentCategory = category;
            var matches = dataByCategory[category] || [];

            var toggleHtml =
                '<div class="toggle-wrap">' +
                    '<div class="toggle" id="view-toggle">' +
                        '<button class="toggle-btn' + (currentView === 'resultados' ? ' active' : '') + '" data-view="resultados">Resultados</button>' +
                        '<button class="toggle-btn' + (currentView === 'clasificacion' ? ' active' : '') + '" data-view="clasificacion">Clasificación</button>' +
                    '</div>' +
                '</div>';

            var bodyHtml = currentView === 'clasificacion'
                ? renderClasificacion(matches)
                : renderMatches(matches);

            document.getElementById('content').innerHTML = toggleHtml + bodyHtml;
            setupToggle();
        }

        function setupTabs() {
            var tabs = document.querySelectorAll('.tab');
            tabs.forEach(function(tab) {
                tab.addEventListener('click', function() {
                    tabs.forEach(function(t) { t.classList.remove('active'); });
                    tab.classList.add('active');
                    renderCategory(tab.getAttribute('data-cat'));
                });
            });
        }

        function setupToggle() {
            var btns = document.querySelectorAll('#view-toggle .toggle-btn');
            btns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var view = btn.getAttribute('data-view');
                    if (view === currentView) return;
                    currentView = view;
                    renderCategory(currentCategory);
                });
            });
        }

        function loadData() {
            var ranges = CATEGORIES.map(function(c) {
                return 'ranges=' + encodeURIComponent("'" + c + "'!A:H");
            }).join('&');
            var url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values:batchGet?' + ranges + '&key=' + API_KEY;

            return fetch(url)
                .then(function(r) {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.json();
                })
                .then(function(data) {
                    (data.valueRanges || []).forEach(function(vr, i) {
                        dataByCategory[CATEGORIES[i]] = parseRows(vr.values);
                    });
                });
        }

        function init() {
            setupTabs();
            loadData()
                .then(function() {
                    renderCategory(CATEGORIES[0]);
                })
                .catch(function(err) {
                    document.getElementById('content').innerHTML =
                        '<div class="error-msg">No se pudieron cargar los datos. Vuelve a intentarlo más tarde.</div>';
                    console.error('Failed to load tournament data:', err);
                });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
