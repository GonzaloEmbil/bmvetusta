<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banner III Torneo Nacional BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=Permanent+Marker&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #1a1a1a;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a14;
        border: 0;
        padding: 14px 32px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(253,237,58,0.25);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(253,237,58,0.4);
    }
    .download-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }

    /* ── Banner ────────────────────────────────────────── */
    :root { --scale: 1; }

    .banner-wrap {
        width: calc(1500px * var(--scale));
        height: calc(500px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        overflow: hidden;
    }

    .banner-scale {
        width: 1500px;
        height: 500px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .banner {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        font-family: 'Kalam', cursive;
        color: #2a2a2a;
        background:
            radial-gradient(ellipse at 25% 30%, rgba(253,237,58,0.55) 0%, transparent 32%),
            radial-gradient(ellipse at 70% 75%, rgba(253,237,58,0.35) 0%, transparent 28%),
            radial-gradient(ellipse at 50% 110%, rgba(180,180,180,0.35) 0%, transparent 50%),
            linear-gradient(135deg, #f4f1e8 0%, #e9e5d8 55%, #ddd9cc 100%);
    }

    /* Paper / watercolor noise — concentric translucent rings */
    .banner::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            radial-gradient(circle at 80% 20%, rgba(40,40,40,0.06) 1px, transparent 2px),
            radial-gradient(circle at 30% 80%, rgba(40,40,40,0.05) 1px, transparent 2px),
            radial-gradient(circle at 60% 50%, rgba(40,40,40,0.04) 1px, transparent 2px);
        background-size: 6px 6px, 9px 9px, 13px 13px;
        opacity: 0.6;
        pointer-events: none;
    }

    /* Yellow brush splash behind the title */
    .banner-splash {
        position: absolute;
        top: 130px;
        left: 40px;
        width: 880px;
        height: 200px;
        background: radial-gradient(ellipse, rgba(253,237,58,0.65) 0%, rgba(253,237,58,0.25) 45%, transparent 70%);
        filter: blur(18px);
        transform: rotate(-3deg);
        pointer-events: none;
        z-index: 1;
    }

    /* Left content block */
    .banner-content {
        position: absolute;
        top: 50px;
        left: 80px;
        right: 320px;
        bottom: 90px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
        z-index: 2;
    }

    .banner-eyebrow {
        font-family: 'Kalam', cursive;
        font-weight: 700;
        font-size: 56px;
        color: #2a2a2a;
        letter-spacing: 2px;
        text-transform: uppercase;
        transform: rotate(-2deg);
        line-height: 1;
        text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
    }

    .banner-title {
        font-family: 'Permanent Marker', 'Caveat', cursive;
        font-weight: 400;
        font-size: 130px;
        color: #FDED3A;
        line-height: 0.88;
        letter-spacing: 1px;
        transform: rotate(-3deg);
        text-shadow:
            -2px -2px 0 #1a1a1a,
             2px -2px 0 #1a1a1a,
            -2px  2px 0 #1a1a1a,
             2px  2px 0 #1a1a1a,
             0    4px 0 rgba(0,0,0,0.25);
        margin-bottom: 18px;
        white-space: nowrap;
    }

    .banner-subtitle {
        font-family: 'Kalam', cursive;
        font-weight: 700;
        font-size: 32px;
        color: #3a3a3a;
        line-height: 1.1;
        letter-spacing: 1px;
        transform: rotate(-1deg);
    }

    /* Shield (top-right) */
    .banner-shield {
        position: absolute;
        top: 50px;
        right: 70px;
        width: 230px;
        height: 230px;
        object-fit: contain;
        z-index: 3;
        filter: drop-shadow(0 4px 14px rgba(0,0,0,0.18));
    }

    /* Bottom black band — dates + venues */
    .banner-band {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: #0a0a14;
        padding: 18px 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 4;
    }

    .banner-band::before {
        content: '';
        position: absolute;
        top: -8px;
        left: 0;
        right: 0;
        height: 4px;
        background: #FDED3A;
    }

    .banner-band-dates {
        font-family: 'Permanent Marker', 'Caveat', cursive;
        font-size: 36px;
        color: #FDED3A;
        letter-spacing: 2px;
        line-height: 1;
    }

    .banner-band-sep {
        color: rgba(255,255,255,0.4);
        font-size: 28px;
        font-weight: 300;
    }

    .banner-band-venues {
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 4px;
        text-transform: uppercase;
    }

    .banner-band-venues strong { color: #FDED3A; font-weight: 800; }
</style>
</head>
<body>
<div class="wrapper">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar banner</button>

    <div class="banner-wrap">
        <div class="banner-scale">
            <div class="banner" id="banner">
                <div class="banner-splash"></div>

                <div class="banner-content">
                    <div class="banner-eyebrow">III Torneo Nacional</div>
                    <div class="banner-title">Balonmano Vetusta</div>
                    <div class="banner-subtitle">Categoría Cadete e Infantil<br>Femenino y Masculino</div>
                </div>

                <img src="../src/assets/escudo.png" class="banner-shield" alt="">

                <div class="banner-band">
                    <span class="banner-band-dates">19, 20 y 21 de junio</span>
                    <span class="banner-band-sep">|</span>
                    <span class="banner-band-venues">Florida Arena <strong>·</strong> Vallobín <strong>·</strong> Oviedo</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function updateScale() {
    var availW = window.innerWidth - 60;
    var availH = window.innerHeight - 160;
    var scale = Math.min(availW / 1500, availH / 500, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var btn = document.getElementById('download-btn');
var banner = document.getElementById('banner');
btn.addEventListener('click', function() {
    btn.disabled = true;
    btn.textContent = 'Generando…';
    html2canvas(banner, {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1500,
        height: 500,
        windowWidth: 1500,
        windowHeight: 500
    }).then(function(canvas) {
        canvas.toBlob(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'banner-iii-torneo-bm-vetusta.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            btn.disabled = false;
            btn.textContent = '⬇ Descargar banner';
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('No se pudo generar el banner. Revisa la consola.');
        btn.disabled = false;
        btn.textContent = '⬇ Descargar banner';
    });
});
</script>
</body>
</html>
