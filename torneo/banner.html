<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banner III Torneo BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #1a1a1a;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a14;
        border: 0;
        padding: 14px 32px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(253,237,58,0.25);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(253,237,58,0.4);
    }
    .download-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }

    /* ── Banner ────────────────────────────────────────── */
    :root { --scale: 1; }

    .banner-wrap {
        width: calc(1500px * var(--scale));
        height: calc(500px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        overflow: hidden;
    }

    .banner-scale {
        width: 1500px;
        height: 500px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .banner {
        width: 100%;
        height: 100%;
        background: #0a0a14;
        color: #fff;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        font-family: 'Inter', sans-serif;
    }

    /* Thin yellow rule across the top edge */
    .banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 6px;
        background: #FDED3A;
    }

    /* Left block: shield + brand */
    .banner-left {
        display: flex;
        align-items: center;
        gap: 36px;
        padding-left: 80px;
        flex: 0 0 auto;
    }

    .banner-logo {
        width: 180px;
        height: 180px;
        object-fit: contain;
    }

    .banner-brand {
        display: flex;
        flex-direction: column;
        gap: 10px;
        line-height: 1;
    }

    .banner-brand-eyebrow {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 44px;
        font-weight: 400;
        color: #FDED3A;
        letter-spacing: 6px;
        text-transform: uppercase;
        line-height: 1;
    }

    .banner-brand-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 96px;
        line-height: 0.9;
        letter-spacing: 3px;
        color: #fff;
        text-transform: uppercase;
    }

    /* Center divider — yellow vertical bar */
    .banner-divider {
        width: 4px;
        height: 260px;
        background: #FDED3A;
        margin: 0 60px;
        flex: 0 0 auto;
    }

    /* Right block: dates + venues */
    .banner-right {
        display: flex;
        flex-direction: column;
        gap: 12px;
        flex: 1 1 auto;
        padding-right: 80px;
    }

    .banner-dates {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 110px;
        line-height: 0.9;
        letter-spacing: 8px;
        color: #FDED3A;
    }

    .banner-dates .sep {
        color: rgba(255,255,255,0.35);
        font-weight: 400;
        margin: 0 8px;
    }

    .banner-month {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 56px;
        font-weight: 400;
        letter-spacing: 10px;
        color: #fff;
        text-transform: uppercase;
        line-height: 1;
    }

    .banner-venues {
        font-size: 18px;
        font-weight: 800;
        color: rgba(255,255,255,0.7);
        letter-spacing: 6px;
        text-transform: uppercase;
        padding-top: 20px;
        margin-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.12);
    }

    .banner-venues strong { color: #FDED3A; font-weight: 800; }
</style>
</head>
<body>
<div class="wrapper">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar banner</button>

    <div class="banner-wrap">
        <div class="banner-scale">
            <div class="banner" id="banner">
                <div class="banner-left">
                    <img src="../src/assets/escudo.png" class="banner-logo" alt="">
                    <div class="banner-brand">
                        <div class="banner-brand-eyebrow">III Torneo</div>
                        <div class="banner-brand-title">BM Vetusta</div>
                    </div>
                </div>

                <div class="banner-divider"></div>

                <div class="banner-right">
                    <div class="banner-dates">
                        <span>19</span><span class="sep">·</span><span>20</span><span class="sep">·</span><span>21</span>
                    </div>
                    <div class="banner-month">Junio 2026</div>
                    <div class="banner-venues">Florida Arena <strong>·</strong> Vallobín</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function updateScale() {
    var availW = window.innerWidth - 60;
    var availH = window.innerHeight - 160;
    var scale = Math.min(availW / 1500, availH / 500, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var btn = document.getElementById('download-btn');
var banner = document.getElementById('banner');
btn.addEventListener('click', function() {
    btn.disabled = true;
    btn.textContent = 'Generando…';
    html2canvas(banner, {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1500,
        height: 500,
        windowWidth: 1500,
        windowHeight: 500
    }).then(function(canvas) {
        canvas.toBlob(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'banner-iii-torneo-bm-vetusta.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            btn.disabled = false;
            btn.textContent = '⬇ Descargar banner';
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('No se pudo generar el banner. Revisa la consola.');
        btn.disabled = false;
        btn.textContent = '⬇ Descargar banner';
    });
});
</script>
</body>
</html>
