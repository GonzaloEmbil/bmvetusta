<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banner III Torneo Nacional BM Vetusta</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        background: #1a1a1a;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
    }

    .wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
        padding: 24px;
    }

    .download-btn {
        background: #FDED3A;
        color: #0a0a14;
        border: 0;
        padding: 14px 32px;
        font-family: 'Inter', sans-serif;
        font-size: 0.95rem;
        font-weight: 800;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 18px rgba(253,237,58,0.25);
        transition: transform 0.2s, box-shadow 0.2s;
    }
    .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(253,237,58,0.4);
    }
    .download-btn:disabled { opacity: 0.6; cursor: wait; transform: none; }

    /* ── Banner ────────────────────────────────────────── */
    :root { --scale: 1; }

    .banner-wrap {
        width: calc(1500px * var(--scale));
        height: calc(500px * var(--scale));
        position: relative;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        overflow: hidden;
    }

    .banner-scale {
        width: 1500px;
        height: 500px;
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: top left;
        transform: scale(var(--scale));
    }

    .banner {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        background: #ece9df;
        font-family: 'Inter', sans-serif;
    }

    /* Title image (cropped from fototorneo.jpg) */
    .banner-titulo {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 1500px;
        height: 420px;
        object-fit: cover;
        object-position: center top;
        z-index: 1;
    }

    /* Black bottom band — dates + venues */
    .banner-band {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 90px;
        background: #0a0a14;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 36px;
        z-index: 2;
    }

    .banner-band::before {
        content: '';
        position: absolute;
        top: -6px;
        left: 0;
        right: 0;
        height: 6px;
        background: #FDED3A;
    }

    .banner-band-dates {
        font-family: 'Inter', sans-serif;
        font-size: 28px;
        font-weight: 900;
        color: #FDED3A;
        letter-spacing: 4px;
        text-transform: uppercase;
    }

    .banner-band-sep {
        color: rgba(255,255,255,0.35);
        font-size: 24px;
        font-weight: 300;
    }

    .banner-band-venues {
        font-family: 'Inter', sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: #fff;
        letter-spacing: 6px;
        text-transform: uppercase;
    }

    .banner-band-venues strong { color: #FDED3A; font-weight: 800; }
</style>
</head>
<body>
<div class="wrapper">
    <button id="download-btn" class="download-btn" type="button">⬇ Descargar banner</button>

    <div class="banner-wrap">
        <div class="banner-scale">
            <div class="banner" id="banner">
                <img src="../src/assets/banner-titulo.jpg" class="banner-titulo" alt="III Torneo Nacional Balonmano Vetusta">

                <div class="banner-band">
                    <span class="banner-band-dates">19, 20 y 21 de junio</span>
                    <span class="banner-band-sep">|</span>
                    <span class="banner-band-venues">Florida Arena <strong>·</strong> Vallobín</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
function updateScale() {
    var availW = window.innerWidth - 60;
    var availH = window.innerHeight - 160;
    var scale = Math.min(availW / 1500, availH / 500, 1);
    document.documentElement.style.setProperty('--scale', scale);
}
window.addEventListener('resize', updateScale);
updateScale();

var btn = document.getElementById('download-btn');
var banner = document.getElementById('banner');
btn.addEventListener('click', function() {
    btn.disabled = true;
    btn.textContent = 'Generando…';
    html2canvas(banner, {
        backgroundColor: null,
        scale: 1,
        useCORS: true,
        width: 1500,
        height: 500,
        windowWidth: 1500,
        windowHeight: 500
    }).then(function(canvas) {
        canvas.toBlob(function(blob) {
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'banner-iii-torneo-bm-vetusta.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            btn.disabled = false;
            btn.textContent = '⬇ Descargar banner';
        }, 'image/png');
    }).catch(function(err) {
        console.error(err);
        alert('No se pudo generar el banner. Revisa la consola.');
        btn.disabled = false;
        btn.textContent = '⬇ Descargar banner';
    });
});
</script>
</body>
</html>
