    <script>
    (function() {
        var cacheBust = '?v=' + Date.now();
        fetch('../data/historia.json' + cacheBust)
            .then(function(r) { return r.ok ? r.json() : []; })
            .then(function(data) {
                var tbody = document.querySelector('#historia-table tbody');
                if (!tbody || !data.length) return;
                tbody.innerHTML = '';
                data.forEach(function(s, idx) {
                    var tr = document.createElement('tr');
                    var difClass = s.DIF > 0 ? 'st-dif-pos' : s.DIF < 0 ? 'st-dif-neg' : 'st-dif-zero';
                    var difText = (s.DIF > 0 ? '+' : '') + s.DIF;
                    if (s.sub) tr.className = 'historia-sub';

                    // Count how many consecutive rows share this temporada
                    var sameTemp = idx > 0 && data[idx - 1].temporada === s.temporada;
                    var temporadaCell;
                    if (s.sub && sameTemp) {
                        temporadaCell = '';
                    } else if (s.sub) {
                        // First sub-row of a group: count rowspan
                        var span = 1;
                        for (var j = idx + 1; j < data.length && data[j].temporada === s.temporada; j++) span++;
                        var label = s.temporada + (s.en_curso ? ' *' : '');
                        temporadaCell = '<td class="historia-season" rowspan="' + span + '">' + label + '</td>';
                    } else {
                        temporadaCell = '<td class="historia-season">' + s.temporada + (s.en_curso ? ' *' : '') + '</td>';
                    }

                    tr.innerHTML =
                        temporadaCell +
                        '<td class="historia-highlight">' + s.pos + 'º</td>' +
                        '<td class="historia-highlight">' + s.puntos + '</td>' +
                        '<td class="historia-hide-mobile">' + s.PJ + '</td>' +
                        '<td class="historia-hide-mobile">' + s.PG + '</td>' +
                        '<td class="historia-hide-mobile">' + s.PE + '</td>' +
                        '<td class="historia-hide-mobile">' + s.PP + '</td>' +
                        '<td class="historia-hide-mobile">' + s.GF + '</td>' +
                        '<td class="historia-hide-mobile">' + s.GC + '</td>' +
                        '<td class="historia-hide-mobile ' + difClass + '">' + difText + '</td>' +
                        '<td>' + (s.division || '') + '</td>' +
                        '<td>' + (s.fase || '') + (s.ascenso ? ' <span class="historia-ascenso">&#9650;</span>' : '') + '</td>';
                    tbody.appendChild(tr);
                });
                // Add footnote if any season is en_curso
                if (data.some(function(s) { return s.en_curso; })) {
                    var note = document.createElement('p');
                    note.className = 'historia-note';
                    note.textContent = '* Temporada en curso';
                    document.querySelector('.historia-table-wrapper').appendChild(note);
                }
            });
    })();
    </script>
